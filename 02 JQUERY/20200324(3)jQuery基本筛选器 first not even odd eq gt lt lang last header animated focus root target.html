<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<!--
	选择器          描述
	:first             获取匹配的第一个元素
	:not(selector)     去除与该selector匹配的元素
	:even              匹配所有index值为偶数的元素，从 0 开始计数！！（所以其实实际上筛选的是奇数行）
	:odd               匹配所有index值为奇数的元素，从 0 开始计数！！（所以其实实际上筛选的是偶数行）
	:eq(index)         匹配一个给定index值的元素（index从0开始）
	:gt(index)         匹配所有大于给定index值的元素
	:lt(index)         匹配所有小于给定index值的元素
	:lang              选择指定语言的所有元素。
	:last              获取最后个元素
	:header            匹配如 h1, h2, h3之类的标题元素
	:animated          匹配所有正在执行动画效果的元素
	:focus             匹配当前获取焦点的元素。
	:root              选择该文档的根元素html
	:target            选择由文档URI的格式化识别码表示的目标元素。不寻常用法
	-->
</head>

</html>
