<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style type="text/css">
		*{
			margin:0;
			padding: 0;
		}
		body{
			font-size: 12px;
			text-align: center;
		}
		a {
			color: #04D;
			text-decoration: none;
		}
		a:hover{
			color: #f50;
			text-decoration: underline;
		}
		.SubCategoryBox{
			width: 600px;
			margin: 0 auto;
			text-align: center;
			margin-top: 40px;
		}
		.SubCategoryBox ul {
			list-style: none;
		}
		.SubCategoryBox ul li {
			display: block;
			float: left;
			width: 200px;/**/
		}
		.showmore {
			clear: both;
			text-align: center;
			padding-top: 10px;
		}
		.showmore a {
			display: block;
			width: 120px;
			margin: 0 auto;
			list-style: none;
		}
		.showmore a span {
			padding-left: 15px;
			background-color: lavenderblush;
		}
		.promoted a {
			color: #f50;
		}
	</style>
</head>
<!--
- 样式操作
  
  $(节点).attr() 获取class和设置class
  
  $(节点).addClass() 追加class样式
  
  $(节点).removeClass() 移除class样式
  
  $(节点).toggleClass() 切换class样式
    有则去除，没有则添加
  
  $(节点).hasClass() 判断是否有某class样式
    有则返回true，无则返回false
    
  $(节点).css()  获取和设置元素的样式属性
  
  $(节点).css("opacity") 获取元素的透明度
  $(节点).css("opacity",0.5) 设置元素的透明度
  
  $(节点).height(), $(节点).width() 获取和设置元素的高度，宽度
    若只传递number，则默认单位是px
    若需要其他单位，需要传递一个string，例如 $("p:first").height("2em");
    
  $(节点).offset() 获取元素在当前视窗中的相对位移
    返回对象包含两个属性：
       $(节点).offset().top，
       $(节点).offset().left
    ⚠️⚠️只针对可见元素有效
    
  
-->
<script type="text/javascript" src="jquery-1.10.1.js"></script>
<script type="text/javascript">
$(function () {
    //1 查看html中是否拥有SubCategoryBox这个class   hasClass()
	alert($("div").hasClass("SubCategoryBox"));//true
	//
	
	//2 移除SubCategoryBox这个class
	$("div").removeClass("SubCategoryBox");
	alert($("div").hasClass("SubCategoryBox"));
	
	//3 添加SubCategoryBox这个class
    $("div:first").addClass("SubCategoryBox");
    
    //4 切换class
	$(".showmore").click(function () {
        $("div:first").toggleClass("SubCategoryBox");
	    return false
    })
	
	//5 获取并设置元素透明度
	alert($("div:first").css("opacity"));//1
	$("div:first").css("opacity",0.5);
	
	//6 获取并设置元素的宽和高
	alert($("div:first").width());//600
    alert($("div:first").height());//112
	$("div:first").width(400);
	$("div:first").height(80);
	
	//7 获取元素在当前视窗中的相对位移
	alert($("div:first").offset().top);//40
    alert($("div:first").offset().left);//170.5(跟屏幕大小有关）
})
</script>
<body>
<div class="SubCategoryBox">
	<ul>
		<li><a href="#">佳能</a><i>(30440)</i></li>
		<li><a href="#">索尼</a><i>(27220)</i></li>
		<li><a href="#">三星</a><i>(20808)</i></li>
		<li><a href="#">尼康</a><i>(17821)</i></li>
		<li><a href="#">松下</a><i>(12289)</i></li>
		<li><a href="#">卡西欧</a><i>(8242)</i></li>
		<li><a href="#">富士</a><i>(14894)</i></li>
		<li><a href="#">柯达</a><i>(9520)</i></li>
		<li><a href="#">宾得</a><i>(2195)</i></li>
		<li><a href="#">奥林巴斯</a><i>(12205)</i></li>
		<li><a href="#">明基</a><i>(1466)</i></li>
		<li><a href="#">爱国者</a><i>(30440)</i></li>
		<li><a href="#">其他品牌相机</a><i>(7275)</i></li>
	</ul>
	<div class="showmore">
		<a href="more.html"><span>显示全部品牌</span></a>
	</div>
</div>
</body>
</html>
