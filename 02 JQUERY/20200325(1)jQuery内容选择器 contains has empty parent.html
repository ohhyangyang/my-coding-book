<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<!--
	- 内容过滤选择器
	  过滤规则主要体现在子元素和文本内容上
	  
	    选择器                    描述                            返回结果
	    :contains(text)          选择含有文本内容为text的元素       集合元素
	    :has('selector')           选择包含匹配selector元素的元素     集合元素
	    :empty                   选择不包含子元素或文本的空元素      集合元素
	    :parent                  选择含有子元素或文本的元素         集合元素
	    
	-->
	<style type="text/css">
		div, span , p {
			width: 200px;
			height: 200px;
			margin: 5px;
			background: #aaa;
			border: #000 1px solid;
			float: left;
			font-size: 17px;
			font-family: Verdana;
		}
		div.mini {
			width: 70px;
			height: 70px;
			background-color: #aaa;
			font-size: 12px;
		}
		div.hide {
			display: none;
		}
	</style>
	<script type="text/javascript" src="jquery-1.10.1.js"></script>
	<script type="text/javascript">
		$(function () {
            $("#btn1").click(function () {
                $("div:contains('DI')").css("background","red");
            });
            $("#btn2").click(function () {
                $("div:empty").css("background","red");
            });
            $("#btn3").click(function () {
                $("div:has('.mini')").css("background","red");
            });
			$("#btn4").click(function () {
                $("div:parent").css("background","red");
            });
        })
	</script>
</head>
<body>
<input id="btn1" type="button" value="选择含有文本'DI'的DIV元素">
<input id="btn2" type="button" value="选择不包括子元素或文本的DIV空元素">
<input id="btn3" type="button" value="选择含有class为mini的元素的DIV元素">
<input id="btn4" type="button" value="选择含有子元素或文本的DIV元素">
<br><br>
<div class="one" id="one">
	id为one，class为one的DIV
	<div class="mini">class为mini的DIV</div>
</div>
<div class="one" id="two" title="test">
	id为two，class为one，title为test的DIV
	<div class="mini" title="other">class为mini，title为other的DIV</div>
	<div class="mini" title="test">class为mini，title为test的DIV</div>
</div>
<div class="one">
	<div class="mini">class为mini的DIV</div>
	<div class="mini">class为mini的DIV</div>
	<div class="mini">class为mini的DIV</div>
	<div class="mini"></div>
</div>
<div class="one">
	<div class="mini">class为mini的DIV</div>
	<div class="mini">class为mini的DIV</div>
	<div class="mini">class为mini的DIV</div>
	<div class="mini" title="test">class为mini,title为test的DIV</div>
</div>
<div>
	包含input的type为hidden的DIV
	<input type="hidden">
</div>
<div>一个DIV元素</div>
</body>
</html>
