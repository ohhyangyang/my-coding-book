	<!--
	- 首先什么是IP地址
	  首先，我们要知道网络中的相互访问其实就是在进行两者间的数据传递。
	  就如同送快递一样，快递发出只有知道你的住址信息，才能将快递送到你的手中。
	  而在网络访问时，只有知道你在网络中的地址信息，才能将数据发送到你的设备上。
	  所以，IP地址就是你在网络中的地址信息。与你现实地址不同的是，你的现实地址
	  使用文字表示，而你在网络中的地址（IP地址）是用二进制数字表示的。

	- 公网与内网中的IP地址
      一般我们会将网络划分公网（连Internet的）与内网。
        
        公有IP地址
        一般称公网中的IP地址为公有地址。公有地址由Inter NIC（因特网信息中心）负责，
        这些IP地址分配给注册并向Inter NIC提出申请的组织机构。公有地址是全球唯一的，公网中不可能存在两个相同的IP地址。
          范围：除了私有地址以外的地址，都属于公有地址
        
        私有IP地址
        一般称内网（即局域网）中的IP地址为私有地址。私有地址是非注册地址，
        用于组织机构内部使用。私有地址的范围如下：
            A类IP地址中：10.0.0.0 ～ 10.255.255.255
            B类IP地址中：172.16.0.0 ～ 172.31.255.255
            C类IP地址中：192.168.0.0 ～ 192.168.255.255
            
         私有地址与公有地址不同，并不是由Internet分配的，是不允许出现在Internet中的，我们在公网中是
         看不到私有IP地址的，并且公有地址也不会使用上述的三类地址。所以，私有地址是不能直接与Internet连接的。
         
         而如果想用私有地址与Internet连接来访问公网，那该怎么做？
         这就需要将私有IP地址转换成公网IP地址，与外部连接。所以，我们平时使用的路由器中会装有一个叫做 NAT（网络地址转换）
         的软件，我们的路由器中会至少会有一个有效的公网IP，NAT会将我们的私有地址转成路由器中的公网IP与外部Internet连接。
         而同样的，因为使用的是路由器中的公共的公网IP来连接Internet，所以这个内网中的PC在Internet中显示的都是路由器的
         公共IP，这样做不仅提供了一定程度的安全，也可以有效的减缓可用的IP地址空间的枯竭问题。（像我们学校或者公司的内网
         一般都是这么做的）
    
    - localhost
     localhost其实是域名，一般windows系统默认将localhost指向127.0.0.1，但是localhost并不等于127.0.0.1，localhost
     指向的IP地址是可以配置的
     
   - 127.0.0.1
     首先我们要先知道一个概念，凡是以127开头的IP地址，都是回环地址（Loop back address），其所在的回环接口一般被理解为虚拟网卡，
     并不是真正的路由器接口。

     所谓的回环地址，通俗的讲，就是我们在主机上发送给127开头的IP地址的数据包会被发送的主机自己接收，根本传不出去，外部设备也
     无法通过回环地址访问到本机。

     小说明：正常的数据包会从IP层进入链路层，然后发送到网络上；而给回环地址发送数据包，数据包会直接被发送主机的IP层获取，后面就
     没有链路层他们啥事了。
     而127.0.0.1作为{127}集合中的一员，当然也是个回环地址。只不过127.0.0.1经常被默认配置为localhost的IP地址。
     一般会通过ping 127.0.0.1来测试某台机器上的网络设备是否工作正常。
   
   
   - 0.0.0.0
     首先，0.0.0.0是不能被ping通的。在服务器中，0.0.0.0并不是一个真实的的IP地址，它表示本机中所有的IPV4地址。监听0.0.0.0
     的端口，就是监听本机中所有IP的端口。
     
   - 本机IP
     本机IP通常仅指在同一个局域网内，能同时被外部设备访问和本机访问的那些IP地址（可能不止一个）。像127.0.0.1这种一般是不被
     当作本机IP的。本机IP是与具体的网络接口绑定的，比如以太网卡、无线网卡或者PPP/PPPoE拨号网络的虚拟网卡，想要正常工作都要
     绑定一个地址，否则其他设备就不知道如何访问它。
     
     
     小例子剧场（帮助理解本机IP、127.0.0.1和0.0.0.0）
            现在有两台pc在同一个局域网内，分别为pc1与pc2，pc1上有一个网卡，IP地址为192.168.10.128
            pc1中sever监听127.0.0.1，则pc1中的client可以连上127.0.0.1，192.168.10.128连不上；而pc2中client都连不上。
            pc1中sever监听192.168.10.128，则pc1中的client可以连上192.168.10.128，127.0.0.1连不上；而pc2中client能连上192.168.10.128。
            pc1中sever监听0.0.0.0，则pc1中的client可以连上127.0.0.1和192.168.10.128，pc2中的client能连上192.168.10.128。
