<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>JSX练习</title>
</head>
<body>
    <h2>前端JS框架列表</h2>
    <div id="list1"></div>
    
    <script type="text/javascript" src="js/react.development.js"></script>
    <script type="text/javascript" src="js/react-dom.development.js"></script>
    <script type="text/javascript" src="js/babel.min.js"></script>
    
    <script type="text/babel">
	    /*
		- JSX语法
		  1 可以通过数组形式写入标签{[<tag1></tag1> , <tag1></tag1> , <tag1></tag1>]}

	     
	          
	          
	     */
	    const names = ["JQuery","Zepto","Angular","React全家桶","Vue全家桶"];
	                //⚠️⚠️数组或者对象起名字的时候一定要加s
	    //1 创建虚拟DOM
	    const ul =(
	        <ul>
		        {
			        names.map((name,index) => <li key={index}>{name}</li>)
			        
			        /*
			        ⚠️
			        相当于
			        names.map(function(name,index) {
                        return <li key={index}>{name}</li>
                    })
                    ⚠️map()把names数组中的每个元素分别放到li标签中，注意参数不加s
                    ⚠️通过后面页面提示，每个li元素都需要跟随一个key属性，属性值为index
                    ⚠️ul创建内容很多时，外面需要加()
                    
			         */
                }
	        </ul>
	    );
	    //2 渲染虚拟DOM
	    ReactDOM.render(ul,document.getElementById("list1"));
	    
	    
    </script>

</body>
</html>
