<!--
- React简介
   React本质上是用于构建用户界面的JS库（构建用户界面也就是指如何把数据展现出来）
   是由Facebook开发的

- React特点：
         声明式 以前在数据改变时，需要通过改变DOM元素来实现，即使是用上了JQuery，也只是让它在编码上更简单的操作DOM
               而使用React，通过数据更新，界面就会自动的变化
               （简单的说，接口的表述方式越接近人类语言——词汇的串行连接（一个词汇实际上是一个概念）——就越“声明式”；
               越接近计算机语言——“顺序+分支+循环”的操作流程——就越“命令式”。）
               
         组件化 创建拥有各自状态的各个组件，再由这些组件构成更加复杂的界面。也方便维护
         
         一次学习，随处编写 React可也实现跨平台应用，不仅可以应用于Web，还可以应用于安卓，ios，
                          同时既可以写在浏览器端，也可以写在服务器端，功能十分强大
                          
         高效 缘于虚拟(virtual)DOM和DOM Diff算法
               virtual DOM  ->减少更新的次数
                      修改DOM元素时，每修改一个DOM元素就需要更新一次，如需要同时修改多个，则需短时间更新多次
                      而虚拟DOM含有很多个对象，分别和DOM元素对应，在修改时会先去修改虚拟DOM，此时不更新界面
                      最后再将虚拟DOM映射到真实的DOM中去，即一次性批量修改
               DOM Diff算法  ->减少更新的区域
                      DOM Diff可以算出哪些地方需要更新，哪些地方不需要更新，它只重绘变化的部分，其他部分不变
         单向数据流

       将react-devtools-master -> shells -> chrome -> build -> unpacked ；将unpacked文件夹拖到1中打开的扩展程序页面。
       安装成功后检查配置：【详细信息】 — 【允许访问文件网址】开启
