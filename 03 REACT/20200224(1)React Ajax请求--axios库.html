<!--
- React本身只关注于界面，不包含发送ajax请求的代码，因此react需要另外引入一个第三方ajax库--axios库,fetch
- axios ->封装XmlHttpRequest对象的库
   特点：相对轻量级
        promise风格
        可用在浏览器和node服务器端
- fetch ->原生函数
   特点：不使用XmlHttpRequest对象提交ajax请求
        不支持老版本浏览器，为了兼容老版本浏览器，可以引入兼容库fetch.js
   总之，新版浏览器使用fetch，老版浏览器使用axios

-->
