<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>JQuery-JSONP</title>
	
	<style>
		#result{
			width: 300px;
			height: 100px;
			border:solid 1px #089;
		}
	</style>
	<script crossorigin="anonymous" src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
</head>
<body>
<button>点击发送JSONP请求</button>
<div id="result"></div>
</body>
<script>
	$('button').eq(0).click(function () {
	    //发送JSONP请求
	    $.getJSON('http://127.0.0.1:8000/jquery-jsonp-server?callback=?',function (data) {
	       $('#result').html(`
	          名称：${data.name}<br>
	          城市：${data.city}`)
        });
	    /*
	    ⚠️⚠️ 使用jQuery发送JSONP请求时，必须写callback=?，传递一个callback参数
	         在发送请求时，jQuery会指定这个callback的命名，如callback: jQuery35106042896420454702_1597054157478
	         在Google Chrome的query string parameters中可以查询到
	         服务器端接收到这个callback后，会使用这个callback函数作为载体来返回请求给浏览器
	         
	     */
		    
    });
</script>
</html>
