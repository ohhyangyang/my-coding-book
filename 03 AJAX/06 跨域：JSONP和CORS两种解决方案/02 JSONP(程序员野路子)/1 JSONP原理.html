<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>原理演示</title>
	<style>
		#result{
			width:300px;
			height: 100px;
			border:solid 1px #78a;
		}
	</style>
</head>
<body>
    <div id="result"></div>
    
    <script type="text/javascript">
        /*
		如何解决跨域 => JSONP
		
		- JSONP是什么
			JSONP(JSON with Padding)，是一个非官方的跨域解决方案，
			纯粹凭借程序员的聪明才智开发出来，只支持GET请求。
			
		- JSONP 怎么工作的？
		   在网页有一些标签天生具有跨域能力，比如：<img > <link> <iframe> <script>。
		   他们不受同源策略影响，可以请求第三方的资源
		   JSONP就是利用<script>标签的src属性来实现跨域。即是将数据从第三方站点中，通过JS代码将数据带到客户端
			 例如 使用jQuery或Axios时，都是需要<script>标签来跨域引入库
		   ⚠️ 只支持GET方法
		
		 */
		
        //声明一个处理数据函数，用以处理从下方<script>标签传递来的函数形式的第三方数据
        function handle(data){
            //获取result对象
            const result = document.getElementById('result');
            result.innerHTML = data.name;
        }
    </script>
    
    <script src="http://127.0.0.1:8000/jsonp-server"></script>
</body>


</html>
