<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Axios发送AJAX请求</title>
	
	<!--引入aixios库-->
	<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
<button>GET</button>
<button>POST</button>
<button>AXIOS</button>
</body>

<script type="text/javascript">
	/*
	更多想过方法见： https://github.com/axios/axios
	Axios 最热门，被VUE和REACT推荐的的AJAX工具库
	特性：
	  可以在NodeJS中发送HTTP请求
	  支持Promise API（ES6推出的异步编程的新的解决方案）
	  拦截器机制
	  可进行数据转换
	  可取消请求
	  自动转换JSON数据
	  客户端安全
	  
	GET 请求  axios.get(url[, config])
	
	POST 请求  axios.post(url[, data[, config]])
	
	axios函数发送请求  axios(url[, config])
	
	注意使用then()方法去返回结果
	 */
	const btnGet = document.getElementsByTagName('button')[0];
    const btnPost = document.getElementsByTagName('button')[1];
    const btnAxios = document.getElementsByTagName('button')[2];
	
	//配置baseURL 用于后面简化路径
	axios.defaults.baseURL = 'http://127.0.0.1:8000';
	
	btnGet.onclick = function () {
	    
	    //GET 请求  axios.get(url[, config])
		axios.get(
		    //url
		    '/axios-server',
			
			{
		    //url参数
		    params:{
		        id:100,
			    vip:7,
			    
		    },
			//请求头
			headers:{
		        name:'Yang',
				age:20
			}
		}).then(res => {
		    console.log(res);
		});
		
		
    };
    
    btnPost.onclick = function () {
        
        //POST 请求  axios.post(url[, data[, config]])
        axios.post(
            //url
            '/axios-server',
	        //请求体
	        {
            username:'admin',
            password:'admin'
            },
	        //其他选项
	        {
            //url参数
	        params:{
	            id:200,
		        vip:9
	        },
	        //请求头参数
	        headers:{
	            height:180,
		        weight:180
	        }
        })
    };
    
    btnAxios.onclick = function(){
        axios({
	        //请求方法
	        method:'POST',
	        
	        //url
	        url:'/axios-server',
	        
	        //url参数
	        params: {
	            vip:10,
		        level:30
	        },
	        
	        //头信息
	        headers: {
	            a:100,
		        b:200
	        },
	        
	        //请求体
	        data:{
	            username:'admin',
		        password:'admin'
	        }
        }).then(res => {
            console.log(res);
            //响应码
            console.log(res.status);
            //响应状态字符串
            console.log(res.statusText);
            //响应头信息
	        console.log(res.headers);
	        //响应体
            console.log(res.data);
    
        })
    }
</script>
</html>
