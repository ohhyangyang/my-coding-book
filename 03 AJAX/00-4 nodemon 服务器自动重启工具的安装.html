	<!--
	- Nodemon是一个实用程序，它将监视源中的任何更改并自动重新启动服务器
	
	- 下载nodemon包
	   打开terminal，输入 Sudo npm install -g nodemon 回车（sudo在此处很重要，不然nodemon将显示command not found）
	   
	- nodemon环境下启动server
	   打开terminal，进入server对应的文件夹，输入 'nodemon server文件名' 回车
	   
	   这样当服务器发生改动时，只要点击ctrl+S保存，就会显示：
	     "[nodemon] restarting due to changes...
          [nodemon] starting `node "server 服务端.js"`
          服务已经启动，8000端口监听中..."
          
    - ctrl+C停止nodemon

	-->
