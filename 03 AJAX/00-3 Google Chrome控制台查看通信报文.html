	-打开Google Chrome的控制台

	        Response Headers 响应行和响应头
	        Request Headers  请求行和请求头
	           :method 代表请求方法
	           :path 代表url
	           :scheme 代表HTTP协议版本
	        Query String Parameters 查询字符串参数 它对url中的参数做了解析，比直接看url更方便，get时才可能
	                                但是如没有参数，则不会显示
	        Request Payload 请求体位置
	        Form Data 请求体，post时才有可能出现
	     Response 响应体（当响应的内容为跳转页面时，response为空)
	
	-->
