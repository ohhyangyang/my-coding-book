<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>AJAX GET 请求</title>
	<style type="text/css">
		#result{
			width: 200px;
			height: 100px;
			border: solid 1px #90b;
		}
		/*
		需求：
		  点击button按钮，向服务器端发送一个请求
		  把服务器端返回的响应体结果显示在div框中
		  同时保证不刷新页面
		 */
	</style>
</head>
<body>
<button>点击发送请求</button>
<div id="result"></div>
</body>
</html>
