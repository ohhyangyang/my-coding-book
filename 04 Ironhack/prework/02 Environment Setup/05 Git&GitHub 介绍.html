<!--
    - Distributed Version Control System (DVCS)
      A Distributed Version Control System (DVCS) or Version Control System (VCS) is 
      a system that records changes to a file or set of files over time so you can 
      recall specific versions of these files at any point later.
    
    - Git 
      Git is a free and open DVCS designed to handle computer programming projects 
      with speed and efficiency. It is easy to learn and has a very high performance.
    
    - GitHub
      GitHub is a code hosting platform for revision control and collaboration. （代码代管平台）
      It lets you and others work together on projects from anywhere.
      它使您和其他人可以在任何地方共同处理项目。
        功能：
            控制不同版本的代码，
            创建不同的分支，
            fork repositories，
            拉请求， do pull requests
            查看其他人的项目（并学习他们如何编码），
            评论其他人的代码。
    
    - Git和GitHub的关系
      Git allows you to control your code in your local machine, 
      while GitHub will enable you to collaborate with your teammates 
      by pushing and pulling the code you and the others have been working on.
          Git => your Version Control System on a local level (in your laptop);
          GitHub => your team’s Version Control System.

    - How does it work
      见网站，图文并茂，解说清楚
      https://my.ironhack.com/lms/courses/course-v1:IRONHACK+WDPREWORK2+MASTER/units/ironhack-course-chapter_1-sequential_2-vertical

    - Terms
       push 意味着笔记本电脑在线（在GitHub上）提供本地制作的代码，以便其他人可以使用它；（上传）
       pull 意味着将代码从在线平台（GitHub）上下载到笔记本电脑，以便可以重用它并从中添加/删除内容。（下载）
