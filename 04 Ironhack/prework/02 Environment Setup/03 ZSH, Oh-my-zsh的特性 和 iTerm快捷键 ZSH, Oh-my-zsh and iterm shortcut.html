	<!--
	- ZSH Advantages (over bash)
	
	   1 autocompletion,  自动完成
	     spelling correction,  拼写纠正
	       bash：大小写敏感，输入de则无法自动拼写成Desktop
	       zsh：输入ccd，可被纠正为cd
	              ironhack也可纠正为Ironhack
	              
	  2 path expansion,  路径扩展
	      bash：可以通过cd Desktop/Ironhack/labs找到文件夹
	      zsh：只需要输入cd des/iron/lab，然后点击Tab，就可自动生成cd Desktop/Ironhack/labs
	      
	  3 right prompt,  正确的提示
	  4 aliases,   别名
	  5 syntax highlighting,  语法突出显示
	  6 clever history,
	  7 easy customization.  易于定制
	  
	  命令：
	    输入zsh打开ZSH
	    Switch to bash:  exec bash
	    Switch to zsh:  exec zsh
	    
	
	- Iterm Creating tabs & splitting panes
	   
	   Operation	             Mac
	   Create a new Tab	        command + T
	   Close Current Tab	    command + W
	   Split Pane Vertically	command + shift + D
	   Split Pane Horizontally	command + D
	   Navigate Among Panes     command + option + 上下左右键
	   Maximize One Pane        command + shift + Enter
	   (Restore hidden panes)
	   Close Current Pane	    command + W
	   
	- Passwords in the terminal
	  为了保密操作，在输入密码时既不会被显示，也不会移动光标，如输入错误，会被要求再次输入

	-->
