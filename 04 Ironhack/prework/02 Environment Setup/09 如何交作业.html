Ironhack工作或作业相关准则

- Step 1: Fork the repository
      在github上选择ironhack-labs上的目标repo，并fork它
      
- Step 2: Clone the repository
      1 在github上，进入我fork的repo，点击clone or download，copy路径
      2 在terminal，进入想要保存copy的位置，输入 git clone <路径>
      3 接下来就可以使用这个project做作业了
      
- Step 3: Add, commit and push the changes
      1 在terminal，进入project
      2 输入git status 查看上传状态
      3 输入git add <file>或.  将changes加到staging area
      4 输入git commit -m""    将changes加到local repo
      5 输入git push origin master 上传changes到github repo
      
- Step 4: Create a pull request
      1 进入github账号学生对应的fork中（⚠️不要进入ironhack源文件）
      2 点击New pull request，查看新旧文件对比
      3 点击New pull request，
             添加title: [city-fulltime or parttime-monthyear]your full name
             添加description: some comments for TAs
      4 点击New pull request，完成
