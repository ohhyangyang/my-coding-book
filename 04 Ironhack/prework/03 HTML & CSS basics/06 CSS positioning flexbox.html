<!--
Positioning
  -position:static  未定位
  -position:relative 相对于元素原来所在位置定位，未添加top left righy bottom属性之前不会移动
  -position:fixed 相对于视口定位，不会随滚动条移动
  -position:absolute 相对于最近的一个定位元素定位（非static状态），如果都未定位，贼相对于body定位
  
  
Flexbox
  首先需设定display:flex,元素将转换为flex容器，其直接子元素都将转换为flex子元素。
  -flex-direction属性
      row    默认值，代表从左到右排列子元素（左对齐）
      row-reverse 从右到左排列（右对齐）
      column  从上向下排列
      column-reverse 从下向上排列
  -flex-wrap属性
      nowrap  默认值，子元素被摆放到一行，可能导致溢出flex容器
      wrap  在必要的时候拆行或拆列
      wrap-reverse  在必要的时候拆行或拆列，但是以相反的顺序。
  -justify-content属性
          flex-start   默认值，左对齐
          flex-end     右对齐
          center    居中
          pace-between  子元素间留有空白的容器内
          space-around	子元素之前、之间、之后都留有空白的容器内。每行第一个元素到行首的距离和每行最后一个元素到行尾的距离将会是相邻元素之间距离的一半。
          space-evenly  子元素之前、之间、之后都留有空白的容器内。主轴起始位置到第一个flex项的间距,，主轴结束位置到最后一个flex项的间距，都完全一样。
          https://css-tricks.com/snippets/css/a-guide-to-flexbox/
  -align-items属性
          stretch  默认值，上下拉伸以适应容器height
          center   垂直居中
          flex-start 上对齐
          flex-end   下对齐
          baseline   text基线对齐
          https://css-tricks.com/almanac/properties/a/align-items/
    
-->
