<!--
-font
  - three groups of fonts:
    serif group: Times New Roman, Georgia
    sans-serif group: Arial, Verdana
    monospace group: Courier, Lucida
  - font-family
    ⚠️⚠️ 应该始终设置多个font-family，使浏览器具有可用的字体栈和多种选择。
       例如 font-family: Arial, Verdana, sans-serif;
            三个字体在font stack中都找不到，才会使用默认字体
  - font-size
    ⚠️⚠️ The standard font-size for the <body> tag is 16px in all browsers.
         h1 standard size: 32px
    如未设置，将继承其父元素font-size
  - font-style
        italic or oblique
  - font-weight
        bold, bolder or lighter
        
- text
  - text-transform
        lowercase, uppercase or to capitalize
  - text-decoration
        none, underline, overline, line-through
  - text-align
        left, right, center, justify
  - text-indent 首行缩进距离
        text-indent: 60px;
  - line-height
  - letter-spacing 字母间距离
  - word-spacing 单词间距离
  
- 长度单位
   px
   em 一个em等于其父元素font-size大小
   rem 一个rem等于其rootHTML元素font-size大小
   
- color
  HTML has three ways to create colors:
  by name (white, red, …)
    hexadecimal code (#f2f2f2) 十六进制
    rgb(<255 , <255 , <255).
    rgba(<255 , <255 , <255 , <1)
