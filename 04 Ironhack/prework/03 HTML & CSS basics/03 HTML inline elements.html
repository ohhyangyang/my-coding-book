<!--
常用内联元素：
   ~<img>  image tag
      <img src="图像的绝对路径或相对路径" alt="图像加载失败时要显示的文本">
         始终应该添加alt属性，因为它有助于了解内容是什么。
   ~<a>   anchor tag 锚点
      <a href="URL超链接" target="_blank">xxx</a>
      target="_blank"会打开新页面
      功能：定向到计算机本地文件（index.html）
           定向到服务器内部或外部URL（https://www.ironhack.com/en/contact）
           定向到同一页面的特定部分（#标签id)
   ~<span> inline text wrapper: 内联文本
   
   ～<br> line break tag: *回车
   ～<small> small text: *小字
   ～<i> italic text: *斜体
   ～<b> bold text: *粗体
   ～<em> italic text with emphasis: *斜体加强调语气
       <em>The content inside should be emphasized differently than the surrounding text</em>
   ～<strong> bold text with emphasis: *粗体加强调非常重要!语气
       <strong>REALLY important to read</strong>
   
   ~<input> input tag:  (will be covered together with forms in a separate lesson)
   ~<textarea> textarea tag:  (will be covered together with forms in a separate lesson)
   ~<button> button tag:  (will be covered together with forms in a separate lesson)
