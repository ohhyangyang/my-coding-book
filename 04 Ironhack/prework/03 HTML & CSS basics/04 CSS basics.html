	<meta charset="UTF-8">

<!--
CSS
  - 添加CSS样式的方式
      1 inline CSS
        ⚠️ inline styles make your code less readable and unmaintainable, always try to avoid that
      
      2 一个分开的CSS文件，应用css文件的标签
        <link rel="stylesheet" href="./style.css" />
          rel: （relationship）
               定义标签内资源和html文档之间的关系
               此时定义为stylesheet，但也可以为其他格式
          href:（hyper reference)
              css文件路径.
              
  - CSS 选择器
      1 Type selectors （tag name）
      2 Class selectors  .
          (⚠️⚠️⚠️
          关于class属性：
          class用于给元素分组 .
          应该仅使用小写字母命名class。
          如果要使用包含多个单词的class名，请使用破折号-将其分开，例如：multi-name-class。
          不能在一个class名称中使用空格。
          一个HTML元素可以附加多个class。当想向一个元素添加几个class时，需要用一个空格隔开)
      3 ID selectors #
      4 Universal selectors *
          使用通用选择器时要非常小心，因为它会大大降低页面速度，毕竟它将这种样式应用于页面中的所有元素！
          通常如CSS文档中font-face之类的全局样式一样写在最前面。
      ...
          
- 另一个经验：
    每个文档（html，css，js等）都是从上至下（第1行，第2行，第3行等）读取的，
    后面的样式会覆盖前面。
      
-->
