 <!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
</head>
<!--
-The basic structure of HTML document
  <!DOCTYPE html>  表明文档内容的标记语言是HTML5。
  <html> 每个文档只能有一个<html>标签。
  <head>  包含关于文档的常规信息
      <style> CSS
      <title>  该标题仅包含text文本，并会显示在浏览器的标题栏中或页面的标签上
      <meta>  用于定义元数据metabase，帮助浏览器来渲染页面
  <body>  显示所有可见元素

-Block elements
  -定义
     块级元素在网页中占新一行，如未设置width，则会占据其父元素的宽度
     内联元素像文本一样。 他们不会开始新的一行，且只会占用必要的宽度。
  -常用块级元素
     ～<header> </header>  header block:
          <header>元素代表介绍性内容，通常是一组介绍性或导航性辅助工具。
          ⚠️它可能包含：标题元素，但也包含logo，搜索表单，作者姓名以及在该网站的所有或大多数页面上的重复性内容。。
     ～<div> </div>  division block:
          它通常用于分隔网页的各个部分或wrap内容以进行样式设置。
          默认情况下，div内容将占据其container的整个宽度。如果div内部没有内容，则默认其height为零。
          ⚠️⚠️ 很明显，任何内容都可以包装在<div>标记内，但这并不总是最好的解决方案。
          例如，如果要创建的是网页的一部分，则应避免使用div，而应使用<section>标记。
          它为代码赋予了更多含义，使其更易于理解以及更易于在搜索引擎中找到。 这是一个语义问题
          使用更合适的元素而不是<div>元素可更好地访问和维护网站。
          以下是一些可以（并且应该）代替div语义标记：
                 nav,main,section,article,header,figure and figcaption,aside,footer, etc.
     ～<section> </section>  section block:
          表示文档或应用程序的通用部分。 一般情况下，根据内容的主题分组。
     ～<article> </article>  article block:
          可以看作是网站的独立部分，可以在整个网站中独立分布或在其他一些网站上重复使用。
          <article>元素推荐包含整个博客文章，新闻文章和类似内容。
     ～<aside> </aside>  aside block:
          包含一些附带内容，虽仍然是主页的一部分，但实际上并不遵循其流程，也不是其最重要的部分。例如sidebar侧边栏
     ～<h1> </h1>, <h2> </h2>, ... <h6> </h6>  headings
     ～<p> </p>  paragraph:
          表示文章段落
     ～<ul> </ul> unordered list  无序列表
     ～<ol> </ol> ordered list  有序列表 (recipes or list of instructions)
       ～<li> </li> list item 列表项（为<ul> <ol>服务）
     ～<table> </table> 表格:
       ～<thead> 表格标题(block)
         ～<tr>  行(block)
            ～<th>  标题单元格(inline)
       ～<tbody> 表格内容(block)
         ～<tr>  行(block)
            ～<td>  单元格(inline)
     ～<footer> </footer> footer block:
          该标签通常包含版权和作者信息或其他导航元素。
     ～<nav> </nav> navigation block: 导航
     ~<hr> 下划线
     ~<address> 包含地址和联系方式

  
-->
<body>

</body>
</html>
