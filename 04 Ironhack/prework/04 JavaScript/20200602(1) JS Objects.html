<!--
Objects
 - 名值对结构  key-value pairs
 
 - use dot notation .
     对象.属性名 = 属性值
     
 - use bracket notation中括号 [] ⚠️⚠️⚠️
    对象["属性名"]=属性值
    使用[]去操作属性会更加灵活，
    在[]中可以直接传递一个变量，这样变量值是多少就会读取那个属性
    
    obj["123"]=789;
    obj["nihao"]="你好";

    var n="123";
    console.log(obj[n]);//789
    n="nihao";
    console.log(obj[n]);//你好
    
 - delete关键字 删除对象的一个属性
   delete Object.key;
 
 - Object.keys(xxx) 函数可以列举出对象的所有属性名，以array的形式返回
 
    Object.keys(olympicRecords);
     => ["athletics100Men",
         "athleticsLongJumpMen",
         "swimming200Men",
         "swimming400Women"]

 
 - for...in
    ⚠️⚠️ placeholder - can be any word (key, record, blah, pizza but pick meaningful names)
    
    for (let key in olympicRecords) {
      console.log(key);
        => athletics100Men
           athleticsLongJumpMen
           swimming200Men
           swimming400Women
    
    for (let key in olympicRecords) {
      console.log(`Property/key: ${key} <==> value: ${olympicRecords[key]}`);
    }
          =>  Property/key: athletics100Men      <==> value: Usain Bolt
              Property/key: athleticsLongJumpMen <==> value: Mike Powel
              Property/key: swimming200Men       <==> value: Michael Phelps
              Property/key: swimming400Women     <==> value: Katie Ledecky
