   例如  let hardWork = 9;
         if (hardWork > 8) {

         }
         
 - switch
 
   switch (expression) {
    case value1:
      // statements executed when the result of expression matches value1
      [break;]
    case value2:
      // statements executed when the result of expression matches value2
      [break;]
    ...
    case valueN:
      // statements executed when the result of expression matches valueN
      [break;]
    default:
      // statements executed when none of the values match the value of the expression
      [break;]
  }

 - break
   break语句会结束一个block execution，例如conditional blocks或loop blocks，然后继续执行程序。
   （您很少会使用break，因为您应该能够控制程序的流程而不是中断它。 您是优秀的开发人员！）
   （除非是switch语句时必须使用）
   
 - continue
   会skip当前loop
   
 - truthy和falsy
   All values are truthy unless they are defined as falsy. The falsy values in JavaScript are:
     false;
     null;
     undefined;
     0;
     NaN;
     (''); 空对象
