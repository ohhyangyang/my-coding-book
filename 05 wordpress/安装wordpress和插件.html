///////XAMPP/////////////////////////////////////////////////
    - 安装wordpress
      （原理和创建一个php项目相同）
      在安装wordpress之前，需要在wordpres.org网站下载wordpress
       1 打开XAMPP，点击start，创建一个localhost虚拟地址
       2 在XAMPP的Volumes中点击mount，在点击explore进入到lampp文件夹
       3 点击进入htdocs文件夹，将下载到的wordpress文件夹放到htdocs中
       4 打开浏览器，进入http://localhost:8080/wordpress/
       5 首次进入之后会要求用户设置database来创建wp-config.php文件，此处我选择了手动安装到wordpress服务器

    - 安装plugin
       首先在官网下载所需要的插件
       解压缩之后，放到htdocs/wordpress/wp-content/plugins/里面
