<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script type="text/javascript">
    /*
    history 对象
    可用用来操作浏览器向前向后翻页

    history.length属性
    可以获取到当次访问的链接数量
    （一关闭就没了）

    history.back()方法
    可以回退到上一个页面，同浏览器后退按钮

    history.forward()方法
    可以跳转到下一个页面，同浏览器前进按钮

    history.go()方法
    可以跳转到指定页面
        参数：（一个整数）
          1  向前跳转一个页面，相当于forward()
          2  向前跳转两个页面
          -1 向后跳转一个页面，相当于back()
          -2 向后跳转两个页面

    */
    
    window.onload=function(){
        var btn01=document.getElementById("btn01")
        btn01.onclick=function(){
            //alert(history.length);
            history.back()//退回到上一个页面
        };
        var btn02=document.getElementById("btn02")
        btn02.onclick=function(){
            history.forward()//退回到上一个页面
        };
    }
    </script>
</head>
<body>
    <h1>History</h1>
    <button id="btn01">back<<</button>
    <br/>
    <button id="btn02">forword>></button>
    <br/>
    <a href="20191121（1）DOM Event 滚轮事件 onmousewheel和DOMMouseScroll.html">去滚轮事件</a>
    
</body>
</html>
