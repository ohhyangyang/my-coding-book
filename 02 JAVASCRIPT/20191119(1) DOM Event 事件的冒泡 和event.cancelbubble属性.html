<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style type="text/css">
    #box1{
        width: 200px;
        height: 200px;
        background-color:violet;
    }
    #s1{
        background-color:pink;
    }
    </style>
    <script type="text/javascript">
    /*事件的冒泡（bubble）
    bubble指的是事件向上传导，
    当后代元素的事件被触发时，其祖先元素的相同事件也会被触发
    在开发中bubble大部分情况都是有意义的，但如果不希望事件冒泡，可以通过event对象来取消冒泡

    event.cancelBubble属性
    如果事件句柄想阻止事件传播到包容对象，必须把该属性设为 true。
    */
    window.onload=function(){
        var s1=document.getElementById("s1");
        s1.onclick=function(event){
            event=event||window.event;
            alert("s1");
            event.cancelBubble=true;
            //取消span元素单击事件的冒泡，不触发body的onclick事件
        };
        var box1=document.getElementById("box1");
        box1.onclick=function(event){
            event=event||window.event;
            alert("box1");
            //没有取消div元素单击事件的冒泡，单击时间向上传导，会触发body的onclick事件
            //event.cancelBubble=true;
        }
        document.body.onclick=function(){
            alert("body");
        };
    };
    </script>
</head>
<body>
    <div id="box1">
        我是box1
        <span id="s1">我是span</span>
    </div>
</body>
</html>
