    //try{} catch{}
    function checkNumber(x){
        try{
            /*
            can put the codes that we want to run
            if try{block} encounters an error, it will send it to the catch{ block}
            */

            if(typeof x === 'string'){
                throw new Error('Invalid argument');
            }else{
                console.log("It's a number");
            }
        }

        catch(error){
            console.log("ERROR WAS" , error);
        }
    }
    checkNumber(5);
    checkNumber("5");
