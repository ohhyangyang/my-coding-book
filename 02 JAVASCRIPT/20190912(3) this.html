<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script type="text/javascript">
    /*
    解析器在调用函数时，每次都会向函数内部传递进一个隐含参数
    这个隐含的参数就是this
    this只存在于function 和 class中
    this我们称为函数执行的上下文对象（函数所处于的backgroud）（函数的上一级）
    根据函数调用方式不同，this指向的对象不同
       1 以函数形式调用时，this永远为window全局对象
       2 以方法形式调用时，this为调用此方法的对应对象
       3 ⚠️⚠️ 箭头函数除外，箭头函数的this详见ES6笔记
    
    apply() call() bind() 会改变this指向为绑定的对象，箭头函数除外
       



    */
    function fun(){
        //console.log(a,b);
        console.log("this="+this);
    }
    fun();//this=object window

    var objA={
        name:"young",
        sayFun:fun//将fun的函数公式送给sayFun，但sayFun()和fun()为公式相同的相互两个独立函数

        /*或者可以写成
        sayFun:function(){
            console.log(this);
        }*/
    }

    var objB={
        name:"Albert",
        sayFun:fun,
        sayThis:function(){
            console.log(this.name)
        }
    }
    objA.sayFun();//this=object objA
    fun();//this=object window
    objB.sayFun();//this=object objB
    objB.sayThis();//Albert, 因为this.name即为objB.name

    
    
    </script>
</head>
<body>
    
</body>
</html>
