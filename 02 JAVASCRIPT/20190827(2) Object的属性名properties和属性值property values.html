<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script type="text/javascript">
    /*
    属性名：
        对象的属性名不强制要求遵守标识符的规范，什么名字都可以使用，
        但是尽量按照标识符规范去做
    注：如果需要使用特殊属性名，不能采用.来操作，需采用另一种方式：
        语法：   对象["属性名"]=属性值

    */
    var obj= new Object();
    obj.name="孙悟空";//name为属性名，孙悟空为属性值

    //特殊属性名则使用[]
    obj["123"]=789;
    console.log(obj["123"]);//789

    /*
    使用[]去操作属性会更加灵活，
    在[]中可以直接传递一个变量，这样变量值是多少就会读取那个属性
    */
    obj["123"]=789;
    obj["nihao"]="你好";

    var n="123";
    console.log(obj[n]);//789
    n="nihao";
    console.log(obj[n]);//你好

    /*
    属性值：
    JS对象的属性值可以是任意数据类型，
    注：甚至可以是一个对象
    */
   var obj2= new Object();
   obj2.name="猪八戒";
   obj.test=obj2;
   console.log(obj);
   console.log(obj.test);//name:"猪八戒"
   console.log(obj.test.name);//猪八戒

   /*
   in运算符：
   通过in运算符可以检查一个对象中是否含有指定的属性
   如果有，则返回true，没有则返回false
   语法：
       "属性名" in 对象
    */
   //检查obj对象中是否有test2属性
   console.log("test2" in obj);//false
   console.log("test" in obj);//true
   console.log("name" in obj);//true


    
    </script>
</head>
<body>
    
</body>
</html>
