<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script type="text/javascript">
    /*
    练习二：
    从键盘接收整数参数，如果该数为1-7，打印对应的星期，否则打印非法参数
    */
    var week=+prompt("请问今天是星期几？（整数）");
    switch(week){
        case 1:
        document.write("星期一");
        break;
        case 2:
        document.write("星期二");
        break;
        case 3:
        document.write("星期三");
        break;
        case 4:
        document.write("星期四");
        break;
        case 5:
        document.write("星期五");
        break;
        case 6:
        document.write("星期六");
        break;
        case 7:
        document.write("星期日");
        break;
        default:
        document.write("非法参数");
        break;

    }
    
    
    </script>
</head>
<body>
    
</body>
</html>
