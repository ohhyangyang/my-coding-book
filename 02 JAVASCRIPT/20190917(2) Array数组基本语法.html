<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script type="text/javascript">
    /*
    使用字面量创建一个数组
    语法：[ ]
    */
    var arr = [1,2,3,4,5,10];
    console.log(arr[3]);//4
    
    /*
    (很少用)使用构造函数创建数组，同时可以将添加的元素作为构造函数的参数传递
    元素之间用，隔开
    */
    var arr2=new Array(10,20,30);
    console.log(arr2);//[10, 20, 30] (3)
    
    //注1
    //创建一个数组，数组中只有一个元素10
    var arr3 = [10];
    console.log(arr3);//[10] (1)

    //(很少用)创建一个length为10的数组
    var arr4=new Array(10);
    console.log(arr4);//[] (10)

    //注2
    //数组中的元素可以为任意数据类型
    var arr5=["hello",1,true,null,undefined];

    //也可以放对象
    //例一
    var obj={name:"Yang"};
    arr5[arr5.length]=obj;
    console.log(arr5[5].name);//Yang
    //例二
    var arr6=[{name:"Yang"},{name:"Albert"},{name:"Lily"}];
    console.log(arr6[2].name);//Lily

    //也可以放一个函数
    var arr7=[function(){alert(1);},function(){alert(2);}];
    console.log(arr7);//[function, function] (2)
    arr7[0]();//alert:1

    //array中也可以放array，如下被称为二维数组（亦存在三维 四维 五维，但不常见了）
    var arr8=[[1,2,3],[4,5,6],[7,8,9]];
    console.log(arr8[1]);//[4, 5, 6] (3)



    
    </script>
</head>
<body>
    
</body>
</html>
