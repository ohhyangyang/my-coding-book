<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script type="text/javascript">
    /*
       多行注释，注释中的内容不会被执行，但可在源代码中查看
       要养成良好的编写习惯
    */
    //单行注释
    alert("hello");
    document.write("hello"); //页面输出的语句
    console.log("hello");  //该语句用于控制台输出日志

    /*
     1.js中严格区分大小写
     2.js中每一条语句以；结尾, 如果不写分号，浏览器会自动添加，但会消耗系统资源，
     而且有时候，浏览器会加错分号，所以必须写分号（英文格式）
     3.js会自动忽略空格和换行
     */
     alert
     (
         "hello"
         )
    
    </script>
</head>
<body>
    
</body>
</html>
