<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script type="text/javascript">
    /*条件运算符，也叫三元运算符（三个操作数）
      语法：
           条件表达式? 语句1 : 语句2
        -执行流程：
          先对条件表达式进行求值，
          如果为true，则执行语句1，并返回执行结果
          如果为false，则执行语句2，并返回执行结果

          如果条件的表达式的结果是非Boolean，
          会将其转化为Boolean，然后再运算


    
    */

    true?alert("语句1"):alert("语句2");//显示语句1
    var a = 10;
    var b = 20;
    a>b? alert("a大"):alert("b大");//显示b大
    
    //获取a和b中的最大值
    var a = 30;
    var b = 43;
    var max = a>b? a:b;//a大则将a赋予max，b大则将b赋予max
    console.log("max="+max);//max=43

    //获取abc中的max
    var a=30;
    var b=43;
    var c=50;
    var max = a>b?a:b;
    var max = max>c?max:c;
    console.log("max="+max);//max=50

    //一种不推荐使用的写法（因为不方便阅读）
    var max = a>b? a>c? a:c : b>c? b:c;//a>b? (a>c? a:c) : (b>c? b:c)
    console.log("max="+max);//max=50

    //如果条件的表达式的结果是非Boolean，会将其转化为Boolean，然后再运算
    "hello"?alert("a"):alert("b");//a,“hello”转Boolean为true
    ""?alert("a"):alert("b");//b，“”转Boolean为false








    </script>
</head>
<body>
    
</body>
</html>
