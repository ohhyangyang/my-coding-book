<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <button id="btn" onmousemove="alert('你点我干嘛！');">我是一个按钮</button>
    <!--
        例如：设置一个事件，鼠标移动到按钮上就跳出alert

        第一种方式：
        可以在标签对应的属性中设置一些js代码，这样当事件被触发时，这些代码将会执行

        （但是，这种写法叫做结构和行为耦合，不方便维护，不推荐使用！！）
    -->



    <script type="text/javascript">
    /*
    HTML DOM Event 对象简介

    事件 Event：文档或浏览器窗口中发生的一些特定的交互瞬间
    JS与HTML的交互是通过事件实现的

    代表性事件：
    当用户点击鼠标时
    当网页已加载时
    当图片已加载时
    当鼠标移动到元素上时
    当输入字段被改变时
    当 HTML 表单被提交时
    当用户触发按键时

    事件句柄(Event Handlers)
    https://www.w3school.com.cn/jsref/dom_obj_event.asp
    */

    </script>
</body>
</html>
