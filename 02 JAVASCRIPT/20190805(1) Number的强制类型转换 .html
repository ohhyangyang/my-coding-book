<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script type="text/javascript">
    /*
    方式一：
    使用Number()函数
        Stirng--> Number
        1 如果是纯数字的字符串，则直接将其转换为数字
        2 如果字符串中有非数字内容，则转换为NaN
        3 如果字符串是空的或者全是空格，则被转为0
        
        Boolean--> Number
        1 true转为1
        2 false转为0
        
        Null--> Number
        转为0
        
        Undefined-->Number
        转为NaN
    方式二：（专门用于处理string）
    parseInt()把字符串转换为一个整数
     可以将一个String中的有效证书内容取出来，从左到右读取，并将之转为Number（只会取左边的整数）

    parseFloat()把一个String转换为一个浮点数   
    和parseFloat()类似，不同的是它可以同样取出小数 
    
    如果对非String使用parseInt()和parseFloat()，则会将其先转换为String，然后再操作


    */

    //调用Number函数将a转换为Number类型
    //方式一
    //String转Number
    var a="123";
    a = Number(a);
    document.write(typeof a);//number
    document.write(a);//123

    var b = "abc";
    b = Number(b);
    console.log(typeof b);//number
    console.log(b);//NaN
    
    var c="  ";
    c = Number(c);
    console.log(c);//0

    //Boolean转Number

    var d = true;
    d = Number(d);
    console.log(d);//1

    var e = false;
    e = Number(e);
    console.log(e);//0

    //Null转Number

    var f=null;
    f = Number(f);
    console.log(f);//0

    //Undefined 转Number

    var g = undefined;
    g = Number(g);
    console.log(g);//NaN

    //方式二
    //调用parseInt()函数将a转换为Number
    var h = "123px";
    h = parseInt(h);
    console.log(h);//123

    var i="123.423a456h";
    i = parseInt(i);
    console.log(i);//123

    var j="b123a456h";
    j = parseInt(j);
    console.log(j);//NaN

    var k="123.423a456h";
    k = parseFloat(k);
    console.log(k);//123.423

    var m = true;
    m = parseInt(m);
    console.log(typeof m); //number
    console.log(m);//NaN



    </script>
</head>
<body>
    
</body>
</html>
