<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script type="text/javascript">
    /*
    函数
    函数也是一个对象
    函数可以封装一些功能（代码），在需要时可以执行这些功能（代码）
    
    三种创建函数的方式
    */
    

    /*
    第一种：常用的是使用函数声明来创建函数
    语法： function 函数名([形参1,形参2...形参N]){
        语句...
    }
    */
    function fun2(){
        console.log("it's my first funcition");
        alert("哈哈哈~~~~(>_<)~~~~");
        document.write("呜呜呜真开心");
    }//结尾无需加分号

    /*
    被封装的函数不会被立即执行，而是会在调用函数的时候按照编写顺序执行
    调用函数语法：函数对象()
    */
    fun2();//it's my first funcition

    /*
    第二种：另一种常见的是使用函数表达式来创建一个函数
    */
    var fun3=function(){
        console.log("我是匿名函数");
    };//将fun3变量赋值到一个匿名函数，结尾需要加分号
    fun3();//我是匿名函数

    //第三种不常用：使用构造函数来创建函数对象，可以将要封装的代码以string的形式传递给构造函数（不常用）
    var fun=new Function("console.log('it is my third function');");//不知道为什么，但是不可以使用it's
    fun();//it is my third function
    
    
    
    </script>
</head>
<body>
    
</body>
</html>
