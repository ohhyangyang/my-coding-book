<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script type="text/javascript">
    var arr1=["a","b","c"];
    var arr2=["1","2","3"];
    var arr3=["一","二","三"];
    /*
    arr.concat()方法可以连接两个或更多的数组，并返回新数组。(不对原数组产生影响)
    语法： arrayObject.concat(arrayX,arrayX,......,arrayX)
    arrayX可以是具体的值，也可以是数组对象。可以是任意多个。
    */
    var result=arr1.concat(arr2,arr3,"Yang","Albert");
    console.log(result);//["a", "b", "c", "1", "2", "3", "一", "二", "三", "Yang", "Albert"] (11)

    /*
    arr.join()方法可以将一个数组转换为一个字符串，并返回转换后的一个字符串（不对原数组产生影响)
    语法： arrayObject.join(separator)
    separator可以指定数组中元素的分隔符，如不填，则默认逗号
    */
    result=arr1.join();
    console.log(result);//a,b,c
    console.log(typeof result);//string
    //指定separator
    result=arr1.join("$");
    console.log(result);//a$b$c

    /*
    arr.reverse()方法用于反转数组中元素的顺序。(会直接修改原数组)
    */
    arr1.reverse();
    console.log(arr1);//["c", "b", "a"] (3)

    /*
    arr.sort() 方法用于对数组的元素进行排序。(会直接修改原数组)(会按照Unicode编码进行排序)
    语法：arrayObject.sort(sortby)
    sortby 可选。规定排序顺序。必须是函数。
    */
    var arr=["b","d","e","a","c"];
    arr.sort();
    console.log(arr);//["a", "b", "c", "d", "e"] (5)
    //因为是根据Unicode排序，所以对数字排序时，可能是错的
    arr=[3,4,11,2,5];
    arr.sort();
    console.log(arr);//[11, 2, 3, 4, 5] (5)
    /*
    ⚠️⚠️
    所以我们可以在sort()内添加回调函数，来指定排序规则
    回调函数需要两个形参：function sortNumber(a,b)
    a被指定为前边的数，b为后边的数
    浏览器会分别使用数组中的元素作为实参去调用函数，并根据返回值来决定元素顺序
    回调函数规则如下：
         如果返回值大于0，元素交换位置
         如果返回值小于或等于0，元素位置不变
    */
    
    arr=[5,4,2,1,3,6,8,7];
    
    
    //升序排列a-b
    arr.sort(function sortNumber(a,b){
        return a - b;//若a>b,a-b>0,那么就交换位置
    });
    console.log(arr);//[1, 2, 3, 4, 5, 6, 7, 8] (8)
    
    //降序排列b-a
    arr.sort(function sortNumber(a,b){
        return b-a;//若a<b,b-a>0,那么就交换位置
    });
    console.log(arr);//[8, 7, 6, 5, 4, 3, 2, 1] (8)
	   
	   
	/*
	arr.filter()创建一个新的数组，新数组中的元素是通过检查指定数组中符合条件的所有元素。
	
	语法： array.filter(function(currentValue,index,arr), thisValue)
	
	    function(currentValue, index,arr)	必选。数组中的每个元素都会执行这个函数
                                  currentValue	必选。当前元素的值
                                  index	可选。当前元素的索引值
                                  arr	可选。当前元素属于的数组对象
	    thisValue	可选。对象作为该执行回调时使用，传递给函数，用作 "this" 的值。
    
    返回值 一个新的、由通过测试的元素组成的数组，如果没有任何数组元素通过测试，则返回空数组。
    
    利用所有使得 callback 返回 true 或等价于 true 的值的元素创建一个新数组。
    如果返回false，则不加入
    
    
    ⚠️⚠️ 如果省略了 thisValue ，"this" 的值为 "undefined"
	⚠️⚠️ filter() 不会对空数组进行检测。
	⚠️⚠️ filter() 不会改变原始数组。
	 */
	
    const arr2 = [1,6,9,10,100,25];
    const result = arr2.filter(function(item){
        if(item % 2 === 0){
            return true;
        }else{
            return false;
        }
    });
    
    /*
    arr.map()方法返回一个新数组，数组中的元素为原始数组元素调用函数处理后的值。
    
       语法  array.map(function(currentValue,index,arr), thisValue)
       
          function(currentValue, index,arr)	  必须。函数，数组中的每个元素都会执行这个函数
                             currentValue	必须。当前元素的值
                             index	可选。当前元素的索引值
                             arr	可选。当前元素属于的数组对象
          thisValue	可选。对象作为该执行回调时使用，传递给函数，用作 "this" 的值。
                    如果省略了 thisValue，或者传入 null、undefined，那么回调函数的 this 为全局对象。

              
    ⚠️  map() 不会对空数组进行检测。
    ⚠️  map() 不会改变原始数组。
     */
    
    let numbers = [1, 5, 10, 15];
    let doubles = numbers.map((x) => {
        return x * 2;
    });

    // doubles变量为[2, 10, 20, 30]
    // numbers变量为[1, 5, 10, 15]
    
    
    
    </script>

</head>

</body>
