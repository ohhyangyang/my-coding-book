<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script type="text/javascript">
    /*
    原型对象prototype
    我们每创建一个对象，解析器都会向函数中添加一个prototype属性
    且该属性为对象数据类型，即是我们所谓的原型对象（如例一）

    当函数以普通函数形式调用时，prototype没有任何作用
    当函数以构造函数形式调用时，它所创建的对象实例都会有一个隐含的属性，指向该构造函数的原型对象，我们可以通过__proto__来访问该原型对象
    
    原型对象相当于一个公共区域，我们可以将同一类对象实例共有的内容统一设置到原型对象中

    以后可在prototype中添加实例对象中共有的属性和方法，而且既不会影响到全局作用域，也不用占空间为每个对象添加方法
    */
   //需参照66课时的视频图解

   //例一
   function Person(){

   }
   console.log(Person.prototype);//object {constructor:f}，通过constructor访问原型对象的方式
   
   //例二
   function MyClass(){

   }//创建一个MyClass函数
    
   var mc=new MyClass();
   var mc2=new MyClass();
   var mc3=new MyClass();
   console.log(mc.__proto__);//object {constructor:f}，通过constructor的mc实例访问原型对象的方式
   console.log(mc.__proto__==MyClass.prototype);//true,constructor和它的mc实例指向的是同一个原型函数
   console.log(mc.__proto__==mc2.__proto__);
   //注意：当我们访问一个对象实例的属性或方法时，它会先在对象自身中寻找，如果找到，直接使用，如果找不到，则会去原型对象中寻找该属性并使用之
   //向原型对象中添加一个属性
   MyClass.prototype.a="MyClass原型对象中的a";//向MayClass的原型对象中添加属性a
   console.log(mc.a);//MyClass原型对象中的a，在mc中还未有a属性，故在原型中寻找
   mc.a="mc实例中的a";  //向mc实例中添加属性a
   console.log(mc.a);//mc实例中的a，就近原则
   //向原型对象中添加一个方法
   MyClass.prototype.sayHello=function(){
       alert("来自原型对象");
   }
   mc.sayHello();//alert:来自MyClass原型对象
   mc.sayHello=function(){  //向mc实例中添加sayHello方法
       alert("来自mc实例")
   }
   mc.sayHello();//alert:来自mc实例，原理同上

   

    </script>
