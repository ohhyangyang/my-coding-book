<!DOCTYPE html>

    <title>Document</title>
    <script type="text/javascript">
    //假如投资的年利率为5%，试求从1000块增长到5000块，需要多少年
    var money=1000;
    var count=0;//定义计数器！！！
    while(money<=5000){
        money *= 1.05
        count++;
    }
    document.write("一共需要"+count+"年");//一共需要33年
    
    
    
    
    
    </script>
</head>
