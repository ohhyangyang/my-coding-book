<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集合</title>
</head>
<body>
    <script>
	    /*
	    - Set 集合
	      ES6提供了新的数据结构 Set（集合）。
	      它类似于数组，但成员的值都是唯一的 ，允许你存储任何类型的唯一值，无论是原始值或者是对象引用。
	      set实现了iterator接口，所以可以使用『...扩展运算符』和『 for…of…』进行遍历，
	      
	    - 创建Set
	      语法上来说，Set是一个构造函数，可以被实例化
	       let s = new Set()
	       
	    - Set实例的属性和方法：
            Set.prototype.size属性   返回集合的元素个数
            Set.prototype.add()方法   增加一个新元素，返回当前集合
            Set.prototype.delete()方法   删除元素，返回 boolean 值
            Set.prototype.has()方法   检测集合中是否包含某个元素，返回 boolean值
            Set.prototype.clear()方法   清空集合，返回 undefined
	     */
        //声明set
        let s = new Set();
        
        console.log(s,typeof s); //Set(0) {} "object"
	    
        let s2 = new Set(['大事儿','小事儿','好事儿','坏事儿','小事儿']);
        
        console.log(s2); //Set(4) {"大事儿", "小事儿", "好事儿", "坏事儿"}  ⚠️⚠️ 自动去重了

        //set.size: s2集合内元素的个数
        console.log(s2.size);  //4
	    
        //set.add(): 添加新的元素给s2集合
        s2.add('喜事儿');
        console.log(s2);  //Set(5) {"大事儿", "小事儿", "好事儿", "坏事儿", "喜事儿"}
	    
        //set.delete(): 删除s2集合内"坏事儿"元素
        s2.delete('坏事儿');
        console.log(s2);  //Set(4) {"大事儿", "小事儿", "好事儿", "喜事儿"}
	    
        //set.has(): 检测集合中是否有某元素
        console.log(s2.has('糟心事'));  //false
        
	    //for...of遍历s2集合
        for(let v of s2){
            console.log(v);
        }     //大事儿 小事儿 好事儿 喜事儿
	    
        //set.clear(): 清空s2集合
        s2.clear();
        console.log(s2);  //Set(0) {}

        
        
    </script>
</body>
</html>
