<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
</head>
<body>
<div></div>
<div></div>
<div></div>
<script>
    /*
    - 『...』 扩展运算符
        扩展运算符 可以在函数调用/数组构造时, 将数组表达式或者string在语法层面展开
                  还可以在构造字面量对象时, 将对象表达式按key-value的方式展开
      语法：
          函数调用：
               myFunction(...Obj);
          字面量数组构造或字符串：
               [...iterableObj, '4', ...'hello', 6];
          构造字面量对象时,进行克隆或者属性拷贝（ECMAScript 2018规范新增特性）：
                let objClone = { ...obj };
                
                
   - 扩展运算符对函数的应用
       函数调用时,替代ES5的apply()方法, 将数组转化为函数参数。
       
   - 扩展运算符对数组的应用
       1 合并数组
       2 拷贝数组
         ⚠️ 实际上, 展开语法和 Object.assign() 行为一致, 执行的都是浅拷贝(只遍历一层)。
            如果想对多维数组进行深拷贝, 就有些问题了。
       3 将伪数组转为真数组
            
   - 扩展运算符对对象的应用
      ⚠️⚠️ 对象不是可迭代对象（即 for...of 循环使用的对象），使用时需要注意
     https://developer.mozilla.org/zh-CN/docs/Web/JavaScript/Reference/Operators/Spread_syntax
     
   - 扩展运算符对字符串的应用
   
   
     
     */
    
/////函数///////////////////////////////////////////////////////////
//  据数组转化为函数参数
    const arr1 = [1,3,5];
    
    //ES5 求数组中的最大值
    var result1 = Math.max.apply(null,arr1);
    console.log(result1);
    
    //ES6 求数组中的最大值
    var result2 = Math.max(...arr1);
    console.log(result2);
    
    
/////数组///////////////////////////////////////////////////////////
//  合并数组
    var parts1 = ['shoulders', 'knees'];
    var parts2 = ['head', 'toes'];
    
    //ES5
    var body1 = parts1.concat(parts2);
    
    //ES6
    var body2 = [...parts1, ...parts2];
    
    // ["shoulders", "knees", "head", "and", "toes"]

// 拷贝数组
    var arr = [1, 2, 3];
    var arr2 = [...arr]; // 类似于 arr.slice()
    arr2.push(4);

    // arr2 此时变成 [1, 2, 3, 4]
    // arr 不受影响

// 将伪数组转为真数组
    const divs = document.querySelectorAll('div');
    const divArr = [...divs];
    console.log(divArr);// 同样适用于arguments


/////对象///////////////////////////////////////////////////////////
    var obj = {'key1': 'value1'};
    var objclone = {...obj};


/////字符串///////////////////////////////////////////////////////////
//打开一个字符串
	const str = "Hello! How are you?";
	console.log(...str);
	
	


</script>
</body>
</html>
