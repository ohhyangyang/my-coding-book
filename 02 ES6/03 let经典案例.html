<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点击 DIV 换色</title>
  <link crossorigin="anonymous" href="https://cdn.bootcss.com/twitter-bootstrap/3.3.7/css/bootstrap.min.css"
        rel="stylesheet">
  <style>
    .item {
      width: 100px;
      height: 50px;
      border: solid 1px rgb(42, 156, 156);
      float: left;
      margin-right: 10px;
    }
  </style>
</head>

<body>
<div class="container">
  <h2 class="page-header">点击切换颜色</h2>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
</div>
<script>
  //点击可修改方块背景色

  //获取div元素对象
  let items = document.getElementsByClassName('item');

  //遍历并绑定事件
  for(let i = 0;i<items.length;i++){
    /*
    ⚠️⚠️⚠️ 此处for循环内绝对不可以用var声明i，因为var不存在块级作用域，i变量始终是window的
    且在window加载时，循环已经结束了，当发生单击事件时，window.i = 3;
    而相反的，let则会将每个i封装在每次循环{}中，且每个i之间互不影响
     */

    items[i].onclick = function(){

      //修改当前元素的背景颜色
      // this.style.background = 'pink';  此处使用this是没有问题的，但我们这次是讨论items[i]的意义
      items[i].style.background = 'pink';
    }
  }

</script>
</body>

</html>
