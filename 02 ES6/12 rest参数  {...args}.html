<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
</head>
<body>
<script>
	/*
	- rest参数  剩余参数
	   用于获取函数的实参，以代替arguments
	   如果函数的最后一个命名参数以...为前缀，则它将成为一个由剩余参数组成的真数组
	   rest参数可以使用所有数组的方法，比如 sort，map，forEach pop filter some every。
	   
	   语法   function(a, b, ...theArgs) {xxx}
	   
	   
	   ⚠️⚠️ rest 参数必须要放到参数最后
	
	- rest参数和arguments对象的区别
	   1 剩余参数只包含那些没有对应形参的实参，而 arguments 对象包含了传给函数的所有实参。
	   2 arguments对象不是一个真正的数组，而剩余参数是真正的 Array实例，
	     也就是说你能够在它上面直接使用所有的数组方法，比如 sort，map，forEach或 pop。
	   3 arguments对象还有一些附加的属性 （如callee属性）
	 */
	
	//ES5 通过argumnts获取实参
    function date(){
        console.log(arguments);
    }
    date('白芷','阿娇','思慧');  //返回 ['白芷','阿娇','思慧']
    
    
    
    //⚠️⚠️ ES6 通过rest参数获取实参
	//情况一
    function date(...args){
        console.log(args);// 返回一个数组
    }
    date('阿娇','柏芝','思慧');
    
    // ⚠️⚠️ rest 参数必须要放到参数最后
	
	//情况二
    function fn(a,b,...args){
        console.log(a);
        console.log(b);
        console.log(args);
    }
    fn(1,2,3,4,5,6); //返回 [3,4,5,6]
	
</script>
</body>
</html>
