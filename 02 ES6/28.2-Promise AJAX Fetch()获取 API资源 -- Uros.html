        /*
        - fetch()  make a request to the server (API) using the URL
          fetch()函数属于全局对象 可以直接调用
          它返回一个 promise对象，这个 promise 会在请求响应后被 resolve，并传回 Response 对象。
    	
    	
          语法 fetch(URL[, 配置对象]);
                (配置对象内容见：https://developer.mozilla.org/es/docs/Web/API/WindowOrWorkerGlobalScope/fetch)
    	
        - promise.then()
            ⚠️⚠️ Promise API（ES6推出的异步编程的新的解决方案！）
            ⚠️⚠️ 一個 promise对象經過 then 後，原本的 promise对象的內容會改變？
                  不會。then方法執行完會另外產生一個新的promise对象
           
    
    
        - Body.json() 
          Body mixin的 json() 方法接收一个 Response 流，并将其读取完成。(body代表response和request的正文)
          它返回一个 Promise， 
    
          返回值  返回一个被解析为JSON格式的promise对象，这可以是任何可以由JSON表示的东西:
                一个object，一个array，一个string，一个number... 
        */

        //测试一
        fetch(`https://pokeapi.co/api/v2/pokemon/1`)  //⚠️⚠️⚠️ 这是一个private API，我不可以获取数据

            .then((response) => {
                console.log(response)

                //读取response，convert the response.body(readableStream) into a JS object(Promise)
                return response.json();
            })

            .then(data => {
                console.log(data)
            })
            .catch((error)=>{
                console.log(error);
            })

        //测试二
        fetch(`https://api.spacexdata.com/v3/launches`)  //⚠️⚠️⚠️ 这是一个private API，我不可以获取数据

            .then((response) => {
                console.log(response)

                //读取response，convert the response.body(readableStream) into a JS object(Promise)
                return response.json();
            })

            .then(data => {
                data.forEach((obj)=>{
                    const newImg = document.createElement('img');
                    newImg.setAttribute('src',obj.links.mission_patch);
                    newImg.style.width = "200px";
                    document.body.appendChild(newImg);
                })
            })
            .catch((error)=>{
                document.body.innerHTML =
                `<h1>ELON IS SORRY</h1>
                 <img src='https://i.insider.com/5b9fdb115c5e5236008b6334?width=750&format=jpeg&auto=webp' style='width:400px'>
