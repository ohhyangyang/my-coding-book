<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symbol内置属性</title>
</head>
<body>
    <script>
	    /*
	    - Symbol内置属性
	      除了定义自己使用的Symbol 值以外， ES6还提供了11个内置的Symbol值，
	      指向语言内部使用的方法。可以称这些方法为魔术方法，因为它们会在特定的场景下自动执行。
	      ⚠️⚠️⚠️
	      Symbol的内置属性可作为对象的属性来设置，以控制对象在特定场景下的表现
	      说白了也就是用于扩展对象功能的
	      
	   - 内置属性如下：
	      Symbol.hasInstance      当其他对象使用instanceof运算符，判断是否为该对象的实例时，会调用这个方法
	      Symbol.isConcatSpreadable  对象的Symbol.isConcatSpreadable属性等于的是一个布尔值，
	                                  表示该对象用于 Array.prototype.concat()时，是否可以展开。
	      Symbol.species         创建衍生对象时，会使用该属性
	      Symbol.match           当执行str.match(myObject)时，如果该属性存在，会调用它，返回该方法的返回值。
	      Symbol.replace         当该对象被str.replace(myObject)方法调用时，会返回该方 法的返回值。
	      Symbol.search          当该对象被str. search (myObject)方法调用时，会返回该方法的返回值。
	      Symbol.split           当该对象被str. split (myObject)方法调用时，会返回该方法的返回值。
	      Symbol.iterator        对象进行for...of循环时，会调用 Symbol.iterator方法，返回该对象的默认遍历器
	      Symbol.toPrimitive     该对象被转为原始类型的值时，会调用这个方法，返回该对象对应的原始类型值。
	      Symbol. toStringTag     在该对象上面调用toString方法时 ，返回该方法的返回值
	      Symbol. unscopables      该对象指定了使用with关键字时，哪些属性会被with环境排除。
	     */
	    
	    
	    //Symbol.hasInstance
        class Person{
            static [Symbol.hasInstance](param){
                //当使用instanceof时，会调用这个方法
                console.log(param);
                console.log("我被用来检测类型了");
            }
        }
        let o = {name:"yang"};
        console.log(o instanceof Person); // {name: "yang"}  我被用来检测类型了  false

        
        
        //Symbol.isConcatSpreadable
        const arr = [1,2,3];
        const arr2 = [4,5,6];
        arr2[Symbol.isConcatSpreadable] = false; //表示不展开arr2数组
        console.log(arr.concat(arr2));//[1, 2, 3, Array(3)]
    </script>
</body>
</html>
