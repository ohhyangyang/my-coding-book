  /*
  - 模块化
     模块化是指将一个大的程序文件，拆分成许多小的文件，然后将小文件组合起来。

  - 模块化的好处
      1) 防止命名冲突
      2) 代码复用
      3) 高维护性

  - 模块化规范相关产品
       ES6之前的模块化规范有
       （ES6之前JS没有一个官方的模块化标准，CommonJS，AMD，CMD都是通过社区推出的）
       1) CommonJS => NodeJS、 Browserify
       2) AMD => requireJS
       3) CMD => seaJS

  - ES6模块化语法
     模块功能主要由两个命令构成：
       export和 import。
         export命令用于规定模块的对外接口
         import命令用于输入其他模块提供的功能

        ⚠️⚠️ 具体见Module文件夹，此部分并没有深入学习
   */
