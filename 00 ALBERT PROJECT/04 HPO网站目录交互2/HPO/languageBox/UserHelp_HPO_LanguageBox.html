<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>language box</title>
	<link rel="stylesheet" href="languageBox.css">
</head>
<body>

<div class="languageBox">
	<div class="English">
		<a href="#">
			<img src="../img/SVG/icon_en.png" alt=""/>
			<span>ENGLISH</span>
		</a>
	</div>
	<div class="Spanish">
		<a href="#">
			<img src="../img/SVG/icon_es.png" alt=""/>
			<span>ESPAÑOL</span>
		</a>
	</div>
	<div class="French">
		<a href="#">
			<img src="../img/SVG/icon_fr.png" alt=""/>
			<span>FRANÇAIS</span>
		</a>
	
	</div>
	<div class="German">
		<a href="#">
			<img src="../img/SVG/icon_de.png" alt=""/>
			<span>DEUTSCH</span>
		</a>
	
	</div>
	<div class="Portuguese">
		<a href="#">
			<img src="../img/SVG/icon_pt.png" alt=""/>
			<span>PORTUGUÊS</span>
		</a>
	
	</div>
	<div class="Russian">
		<a href="#">
			<img src="../img/SVG/icon_ru.png" alt=""/>
			<span>RUSSIAN</span>
		</a>
	
	</div>
</div>
</body>
</html>
