<!doctype html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>图片标签</title>
    </head>
    <body>
        <!--
            使用<img />标签来向网页中引入外部图片（自结束）
            属性：
               src 设置一个外部图片的路径
               
               alt 图片的描述，在图片不能显示时才显示alt（有的浏览器不显示alt）
                   （搜索引擎通过alt属性来识别图片）
                   （如果不写alt，则搜索引擎不进行收录）

               width 修改图片宽度(px)
               height 修改图片高度(px)
               (若只指定其一，会等比例缩放，若同时指定，则按照指定的值设置)
               (但注意，在开发中，除了自适应页面，不建议设置width和height属性，
               如尺寸不合适，自己修剪，以免空间的浪费，或造成图片不清晰)

            相对路径：
               src属性配置的图片路径
               相对路径只相对于当前资源所在目录（文件夹）的位置
               例：<img src="img/4.gif" alt="simposons1" />
               （该html文件所在文件夹--img文件夹--4.gif)
               若图片位置在当前资源所在文件夹的上一级里，
               ../代表返回上一级目录，返回几级就写几个../
               例：<img src="../4.gif" alt="simposons1" />
               (返回该html文件所在位置的上一级--4.gif)
               若图片在当前资源所在位置的兄弟目录里
               例：<img src="../img/4.gif" alt="simposons1" />
               (返回该html文件所在位置的上一级--img文件夹--4.gif)

            图片的格式：
                JPEG(JPG)
                JPEG支持的颜色多，图片可以压缩，不支持透明
                一般用来保存照片等颜色丰富的图片
                
                GIF
                GIF支持的颜色少，支持简单的透明（线性的），支持动态图
                图片颜色单一，动态图时使用

                PNG
                PNG支持的颜色多，支持复杂透明
                可以用来显示颜色复杂的透明图片
            
            图片的使用原则：
                效果不一致，使用效果好的
                效果一致，使用小的
        -->
        <img src="img/4.gif" alt="simposons1" width="500px" />
    </body>
</html>
