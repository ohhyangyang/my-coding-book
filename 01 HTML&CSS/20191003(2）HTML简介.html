    *HTML(Hypertext Markup Language)超文本标记语言
    纯文本，只能保存文本内容，图片音频视频等格式化内容，都不能设置
    超文本指的是超链接，可以让我们从一个页面跳转到另一个页面
    而标记指代，HTML使用标签的形式来表示网页中的不同组成部分

    *标准格式：
    <html>
           <head>
                  <title>这是一个非常好的网页</title>
           </head>
           <body>
                  <h1>这是我的第一个网页</h1>
           </body>
    </html>
    
    注意
    若是通过记事本编辑代码，注意保存时保存成html格式
    但若是后期要从txt更改为html格式，注意，需要先在"计算机-组织-文件夹和搜索选项"的"查看"中取消"隐藏已知文件类型的扩展名"(具体见视频3)
    如想再次编辑该html，可以用记事本再次打开

    *根据W3C标准（万维网联盟），网页由三部分组成：结构，表现，行为
    结构：HTML用于描述页面的结构
    表现：CSS用于控制页面中元素的样式，美化样式
    行为：JavaScript用于响应用户操作，页面的行为

    W3C(World Wid Web Consortium)定义网页相关的标准，包括HTML，CSS，DOM，HTTP，XML等标准
    WHATWG 推动了HTML5标准

    *HTML的发展：
    从1993年开始的第一个版本，一直到2014年由W3C和WHATWG一起推出的HTML5，
    共推出了6个版本
    其中有三个版本被广泛使用：HTML4 HTML5 XHTML1.0
    为了让浏览器知道我们使用的HTML版本，我们还要在网页的最上边添加一个doctype声明来告诉浏览器网页的版本
   
111
