<!doctype html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>绝对定位</title>
        <style type="text/css">
        /*
        当position:absolute，开启绝对定位时
        1 绝对定位开启后，元素会脱离文档流，因此会改变元素的性质，
          ⚠️不论是内联元素还是块元素都会成为宽高默认会被自身内容撑开的块元素
        2 开启绝对定位后，如不设置偏移量，元素的位置不会发生改变
        3 绝对定位是相当于对离它最近的的开启了定位的祖先元素进行定位的
          如都未开启，则相对于浏览器窗口定位
          （⚠️一般情况下，开启了子元素的绝对定位，都会同时开启其父元素的相对定位）
        4 绝对定位会提升一个层级

        */
        .box1{
            width: 200px;
            height: 200px;
            background-color: red;
        }
        .box2{
            width: 300px;
            height: 300px;
            background-color: orange;
            position: relative;
        }
        .box3{
            width: 200px;
            height: 200px;
            background-color: yellow;
            position:absolute;
            left: 500px;
            top: 100px;
        }
        .box4{
            width: 300px;
            height: 300px;
            background-color: yellowgreen;
        }
        
        .s1{
            width: 100px;
            height: 100px;
            background-color: yellow;
            position: absolute;
        }
        </style>
    </head>
    <body>
        <div class="box1"></div>
        <div class="box2">
            <div class="box3"></div>
        </div>
        <div class="box4"></div>
        <span class="s1">abc</span>
    </body>
</html>
