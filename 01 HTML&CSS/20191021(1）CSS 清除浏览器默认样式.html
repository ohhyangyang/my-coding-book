<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style type="text/css">
    /*
    在设置样式之前，浏览器为很多元素都设置了默认样式，而这些默认样式，在正常情况下不需要使用
    所以在编写样式之前需要将默认的margin和padding去掉*/
    /*清除浏览器默认样式（以后会学习更好的方式）*/
    *{
        margin: 0;
        padding: 0;
    }

    .box1{
        width: 100px;
        height: 100px;
        background-color: red;
    }
    p{
        background-color: yellow;
    }
    
    </style>
</head>
<body>
    <div class="box1"></div>
    <p>我是p</p>
    <p>我是p</p>
    <p>我是p</p>
    <ul>
        <li>无序列表</li>
        <li>无序列表</li>
        <li>无序列表</li>
        <li>无序列表</li>
    </ul>
</body>
</html>
