<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>有序列表和无序列表</title>
        <style type="text/css">
            /*
            去掉项目符号
            
            ul{
                list-style: none;
            }
            */
            </style>
    </head>
    <body>
        <!--
            列表就相当于去超市购物时的那个购物清单
            在HTML中也可以创建列表，在网页中一共有三种列表
            1 无序列表
            2 有序列表
            3 定义列表

            *<ul>无序列表 unordered list (但用的<ul>偏多)
                使用<ul>标签创建
                使用<li>(list item)创建列表项，一个<li>为一个列表项
                常用于：新闻列表 网站横向导航条 
            ⚠️ <ul><li>均为块元素

            <ul> type属性:可以修改无序列表的项目符号
               可选值：
                  disc 默认的实心点
                  square 实心方块
                  cirle 空心圆圈
            ⚠️ 不要记，默认的项目符号在开发中不使用
            如果需要设置项目符号，则可以通过<li>设置背景图片来设置

            *<ol>有序列表 ordered list 亦为块元素
                用法和<ul>相同
                
            
            <ol> type属性：可以指定序号的类型
                可选值：
                  1    阿拉伯数字（默认值）
                  a    小写字母
                  A    大写字母
                  i    小写罗马数字
                  I    大写罗马数字

            *<dl>定义列表用来对一些词汇或内容进行定义 description list
            （用的偏少）
                <dl>中有两个子标签
                      <dt> 被定义的内容 term/name
                      <dd> 对定义内容的描述 description/value of a term

            ⚠️ <ul><ol><dl>列表之间可以互相嵌套，<ul>中放 <ol>，<ol>中放<ul>...都可以
        -->
        <!--ul举例-->
        <ul>
            <li>Yang Ge</li>
            <li>Albert Pastor</li>
            <li>Suika Huang</li>
            <li>Bu Bu</li>
        </ul>

        <!--ol举例-->
        <ol type="I">
            <li>结构</li>
            <li>表现</li>
            <li>行为</li>
        </ol>

        <!--dl举例-->
        <dl>
            <dt>武松</dt>
            <dd>打虎英雄，战斗力99</dd>
            <dd>打死西门庆，投奔梁山</dd>
            <dt>武大</dt>
            <dd>卖烧饼，战斗力0</dd>
        </dl>

        <!--互相嵌套-->
        <p>菜谱</p>
        <ul>
            <li>
                鱼香肉丝
                <ol>
                        <li>鱼</li>
                        <li>香</li>
                        <li>肉丝</li>
                </ol>
            </li>
            
            
            <Li>
                宫保鸡丁
                <ol>
                    <li>宫保</li>
                    <li>鸡丁</li>
                </ol>
            </Li>
            <li>
                红烧狮子头
                <ul>
                    <li>红烧</li>
                    <li>狮子</li>
                    <li>头</li>
                </ul>
            </li>
        </ul>

        
    </body>
</html>
