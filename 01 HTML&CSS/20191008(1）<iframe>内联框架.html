<!doctype html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>内联框架</title>
    </head>
    <body>
        <!--
            使用内联框架可以引入一个外部的页面
            使用iframe来创建内联框架
            属性：
                src：指向一个外部页面的路径，可以使用相对路径
                (但在开发中，不推荐使用内联框架，因为不会被搜索引擎检索))
                width:
                height:
                name:
        -->
        <iframe src="20191007（2）XHMTL语法规范.html" name="tom"></iframe>
    </body>
</html>
