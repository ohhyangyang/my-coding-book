<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>display visibility</title>
        <style type="text/css">
        /*
        display 可以规定元素类型
        可选值：
           none: 不被显示，且不占据位置！！！！
           inline: 默认。此元素会被显示为内联元素
           block: 显示为块级元素，此元素前后会带有换行符。
           inline-block	行内块元素。（可以设置宽高，且不独占一行，例如img这种）

        visibility 规定元素是否可见。
        可选值：
           visible：默认值。元素是可见的。
           hidden：元素是不可见的。但会占据位置！！！！

        
        */
        a{
            background-color: #bfa;
            display: inline-block;
            width:500px;
            height:500px;
            visibility: hidden;
        }
        </style>
    </head>
    <body>
        <a href="#">我是很大的超链接</a>
        <span>hello</span>
    </body>
</html>
