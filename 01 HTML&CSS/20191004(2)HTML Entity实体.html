<!doctype html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>实体</title>
    </head>
    <body>
        <!--
            在HTML中，一些如< >这种特殊的字符不可以直接使用，
            需要使用一些特殊符号来表示，这些符号被称为实体（转义字符）
            实体的语法：
                &实体的名字;
            例如： <       &lt; (less than)
                  >       &gt; (greater than)
                 空格     &nbsp; (non-break space)
                 版权符号  &copy;
                https://www.w3school.com.cn/html/html_entities.asp
        -->
        a&lt;b&gt;c <!--a<b>c-->
        <p>&copy;今天天气&nbsp;好晴朗，处处&nbsp;好风光</p><!--©今天天气 好晴朗，处处 好风光-->
    </body>
</html>
