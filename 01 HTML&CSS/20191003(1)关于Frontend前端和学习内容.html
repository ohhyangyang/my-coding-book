    /*
    前端基础：
    *前端工程师做什么？前后端工程师的工作都是软件的开发

    *软件的架构：
    C/S(client/server) （Android做C/S客户端）
        C表示客户端，用户通过客户端来使用软件
        S表示服务器，服务器负责处理软件的业务逻辑（远程）
        例如系统中的软件QQ,360,office,XMind
        （结合视频图解）
        特点：1 软件使用前必须安装
             2 软件更新时，服务器和客户端得同时更新
             3 C/S架构的软件不能跨平台使用（不能夸系统：指windows，ios，android等系统）
             4 C/S架构的软件客户端和服务器通信采用的是自有协议（加密），相对来说比较安全

    B/S（browser/server）（HTML做B/S浏览器）（JavaEE做客户端）
        B表示浏览器
        S表示服务器
        B/S本质上也是C/S，只不过B/S构架的软件，使用的是浏览器作为软件的客户端,通过使用浏览器访问网页的形式来使用软件
        例如：京东 淘宝 12306 知乎 新浪微博（大多数已经不简单是网站了，可实现发送，购买等用途了，严格来讲都是application）
        特点：1 软件不需要安装，直接使用浏览器访问网址即可
             2 软件更新时，客户端不需要更新
             3 软件可以跨平台使用，只要系统中有浏览器，就可以使用（因此开发过程中比C/S简单很多）
             4 B/S架构的软件，客户端和服务器之间采用的是通用的HTTP协议，相对来说不安全（HTTPS升级后更安全，涉及网银等信息时，应使用HTTPS）

    *软件开发流程
    （结合视频图解）
    传统工作模式：
    网页设计师根据需求设计网页（PS）
    前端工程师将设计做成静态网页 （HTML） 
    后台工程师将静态网页修改为动态网页（JSP）

    前端相关工作包括：将设计师的设计转换为代码，然后交给后台工程师
                   我们需要和设计师沟通，和产品经理沟通，和后台工程师沟通
                   我们编写的网页会在整个项目的最前端由用户查看

    新工作模式1：
    不将代码交给后台，由前端给后台提出需求，包括要求提供的数据，定义对应的接口，返回对应的信息

    新工作模式2:
    取消后台工程师，前端工程师做完静态页面之后，直接通过NodeJS做后台的工作，最终发展成全栈工程师

    *前端技术好学吗？
    无底洞 入门简单 深入难
    不断学习 不断吸取知识
    加油！越是难学，工资越高

    
    */
