<!doctype html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>CSS语法</title>

        <link rel="stylesheet" type="text/css" href="#"/>

        <style type="text/css">
        p{
            color:thistle;
        }
        /*
        css注释，必须编写在style标签，或css文件中

        css语法：
        选择器{声明}

        选择器：
           用来选中页面中指定的元素（标签）
        声明块：
           紧跟在选择器之后，使用{}括起来，声明块中填写一组一组名值对结构，称为声明
           每组的格式为 样式名:样式值;
        */
        
        
        </style>
    </head>
    <body>

        <p style="color: thistle"></p>

    </body>
</html>
