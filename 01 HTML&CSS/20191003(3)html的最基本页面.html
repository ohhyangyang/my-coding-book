<!DOCTYPE html>
<!--
    HTML5的文档声明，声明当前网页是按照HTML5标准编写的
    编写网页时，一定要把文档声明写在最上边
    如果不写，则会导致一些浏览器进入一个怪异模式，会导致页面无法正常显示
-->
<html>
<!--
    html根标签，一个页面中有且只有一个根标签，网页中的所有内容都应该写在html根标签中
-->
    <head>
    <!--
        head标签，内容不会在网页中直接显示，它用来帮助浏览器解析页面
    -->
        <title>网页的标题</title>
        <!--
            网页的标题标签，默认会显示在浏览器的标题栏中，
            搜索引擎在检索页面时，会首先检索title标签中的内容
            会影响网页在搜索引擎中的排名，非常的重要
            （一般是公司里SEO的工作，不用我们自己写）
        -->
    </head>
    <body>
    <!--
        body标签用来设置网页中的主体内容，网页中所有可见内容，都该在body里
    -->
        <h1>这是我的<font color="orange" size="7">第一个</font>网页</h1>
        <!--
            属性：可以通过属性来设置标签来处理标签中的内容
            属性名="属性值"
            写在开始标签中
            且一个标签中可以设置多个属性，之间用空格分开
            （但是color size这类标签现已属于CSS范畴了，已不再在HTML中使用）
        -->
        <!--
        一定要养成良好的编写注释习惯，且要简单明了
        -->
    </body>
</html>
