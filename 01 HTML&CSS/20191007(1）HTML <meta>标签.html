<!Doctype html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title></title>
        <!--
            使用meta标签可以用来设置网页的关键字
        -->
        <meta name="keywords" content="HTML5,JavaScript,前端.Java"/>
        <!--
            还可以用来指定网页的描述

            搜索引擎在检索页面时，会同时检索页面中的关键词和描述，但是他们不会影响页面在搜索中的排名
        -->
        <meta name="description" content="发布h5和js等前端相关信息"/>

        <!--
            使用meta用来做请求的重定向
            <meta http-equiv="refresh" content="秒数;url=目标路径（绝对路径或相对路径）"/>
        -->
        <meta http-equiv="refresh" content="5;url=http://www.baidu.com"/>
        <!--
            其他可根据W3C example实例来参考
            https://www.w3schools.com/tags/tag_meta.asp
        -->
    </head>
    <body>
    </body>
</html>
