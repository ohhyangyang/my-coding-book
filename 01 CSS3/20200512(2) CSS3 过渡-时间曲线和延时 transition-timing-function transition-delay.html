<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style type="text/css">
		/*
		- transition-timing-function 规定过渡效果的速度曲线，在整个transition变化过程中，变化速度可以不断改变。
		  
		  你可以规定多个timing function,通过使用 transition-property属性，
		  可以根据主列表(transition property的列表)给每个CSS属性应用相应的timing function.
		  
		  ⚠️⚠️
		  如果timing function的个数比主列表中数量少，缺少的值被设置为初始值ease 。
		  如果timing function比主列表要多，timing function函数列表会被截断至合适的大小。
		  这两种情况下声明的CSS属性都是有效的。
		  
		     默认值：	ease
		     继承：	no
		     语法：transition-timing-function: linear|ease|ease-in|ease-out
		                                      |ease-in-out|cubic-bezier(n,n,n,n);
		        值	                    描述
		        ------------------- *连续的动画* ------------------
		        ease(默认值)	            先加速，然后减速的效果（cubic-bezier(0.25,0.1,0.25,1)）。
		        linear	                匀速效果（等于 cubic-bezier(0,0,1,1)）
		        ease-in	                逐渐加速效果（等于 cubic-bezier(0.42,0,1,1)）。
		        ease-out	            逐渐减速效果（等于 cubic-bezier(0,0,0.58,1)）。
		        ease-in-out	            先加速，然后减速的效果（等于 cubic-bezier(0.42,0,0.58,1)）。（比ease效果强烈）
		        cubic-bezier(n,n,n,n)	在 cubic-bezier 函数中定义自己的值。可能的值是 0 至 1 之间的数值。
		                                  https://cubic-bezier.com/#.17,.67,.83,.67
		        ------------------- *断续的动画* ------------------
		        step-start              等于steps(1,start)（一步，在时间开始时）
		        step-end                等于steps(1,end)（一步，在时间结束时）
		        steps(步数[,start|end])  产生不连续的逐步运动
		               步数：必须为正数，表示把动画平均分成了多少段
		               start|end：指定每一步触发的时间点是在该段的开头(start)还是结尾(end)（默认值为end）
		               https://www.zhangxinxu.com/wordpress/2018/06/css3-animation-steps-step-start-end/
		               
		 - transition-delay 规定过渡效果何时开始。
		   表明动画效果属性生效之前需要等待的时间。
		   
		      默认值：	0s
		      继承性：	no
		      语法：  transition-delay: time;
		          time	  规定在过渡效果开始之前需要等待的时间，以秒或毫秒计。 一定要加单位（不能写0，要写0s!!!）
		          以秒(s)或毫秒(ms)计。
		     你可以指定多个延迟时间，每个延迟将会分别作用于你所指定的相符合的css属性（transition-property）
		     
		     ⚠️⚠️
		     如果指定的delay个数小于property个数，那么时间列表会重复。
             如果delay列表更长，那么该列表会被裁减。两种情况下，property列表都保持不变。
		 */
		*{
			margin: 0;
			padding: 0;
		}
		#test1{
			width: 100px;
			height: 100px;
			background-color: #d0e9c6;
			text-align: center;
			/*border-radius: 50%;*/
			
			/*居中*/
			position: absolute;
			top: 0;
			bottom: 0;
			left: 0;
			right: 0;
			margin: auto;
			
			transition-property:width,height,background-color/*约等于all*/;
			transition-duration: 5s,1s;/*相当于5s,1s,5s,1s*/
			transition-timing-function: ease-out;
			transition-delay: 2s;
		}
		#box1{
			width: 400px;
			height: 400px;
			border: black solid 1px;
			
			/*居中*/
			position: absolute;
			top: 0;
			bottom: 0;
			left: 0;
			right: 0;
			margin: auto;
		}
		#box1:hover #test1{
			width: 400px;
			background-color: #fd7e14;
			
		}
	</style>
</head>
<body>
<div id="box1">
	<div id="test1"></div>
</div>
</body>
</html>
