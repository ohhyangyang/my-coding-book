		/*
		  来源：https://segmentfault.com/a/1190000013023485
           1. 简介

           在解释BFC之前，先说一下文档流。我们常说的文档流其实分为普通流、浮动流、定位流三种。
           而普通流其实就是指BFC中的FC。FC(Formatting Context)，直译过来是格式化上下文，它是页面中的一块渲染区域，有一套渲染规则，决定了其子元素如何布局，以及和其他元素之间的关系和作用。
           常见的FC有BFC、IFC，还有GFC和FFC。

           BFC(Block Formatting Context)块级格式化上下文，是用于布局块级盒子的一块渲染区域。
           MDN上的解释：BFC是Web页面 CSS 视觉渲染的一部分，用于决定块盒子的布局及浮动相互影响范围的一个区域。

           注意：一个BFC的范围包含创建该上下文元素的所有子元素，但不包括创建了新BFC的子元素的内部元素。
               这从另一方角度说明，一个元素不能同时存在于两个BFC中。因为如果一个元素能够同时处于两个BFC中，那么就意味着这个元素能与两个BFC中的元素发生作用，就违反了BFC的隔离作用。

           2. 三种文档流的定位方案

           常规流(Normal flow)

           在常规流中，盒一个接着一个排列;
           在块级格式化上下文里面， 它们竖着排列；
           在行内格式化上下文里面， 它们横着排列;
           当position为static或relative，并且float为none时会触发常规流；
           对于静态定位(static positioning)，position: static，盒的位置是常规流布局里的位置；
           对于相对定位(relative positioning)，position: relative，盒偏移位置由top、bottom、left、right属性定义。即使有偏移，仍然保留原有的位置，其它常规流不能占用这个位置。
           
           浮动(Floats)

           左浮动元素尽量靠左、靠上，右浮动同理
           这导致常规流环绕在它的周边，除非设置 clear 属性
           浮动元素不会影响块级元素的布局
           但浮动元素会影响行内元素的布局，让其围绕在自己周围，撑大父级元素，从而间接影响块级元素布局
           最高点不会超过当前行的最高点、它前面的浮动元素的最高点
           不超过它的包含块，除非元素本身已经比包含块更宽
           行内元素出现在左浮动元素的右边和右浮动元素的左边，左浮动元素的左边和右浮动元素的右边是不会摆放浮动元素的
           
           绝对定位(Absolute positioning)

           绝对定位方案，盒从常规流中被移除，不影响常规流的布局；
           它的定位相对于它的包含块，相关CSS属性：top、bottom、left、right；
           如果元素的属性position为absolute或fixed，它是绝对定位元素；
           对于position: absolute，元素定位将相对于上级元素中最近的一个relative、fixed、absolute，如果没有则相对于body；
           
           3. BFC的生成触发方式

              1 根元素，即HTML标签
              2 float浮动元素：float值为left、right
              3 overflow值不为 visible，为 auto、scroll、hidden
              4 display值为 inline-block、table-cell、table-caption、table、inline-table、flex、inline-flex、grid、inline-grid
              5 定位元素：position值为 absolute、fixed
              注意：display:table也可以生成BFC的原因在于Table会默认生成一个匿名的table-cell，是这个匿名的table-cell生成了BFC。

           4. BFC的约束规则

            浏览器对BFC区域的约束规则：
              1 生成BFC元素的子元素会一个接一个的放置。
              2 垂直方向上他们的起点是一个包含块的顶部，两个相邻子元素之间的垂直距离取决于元素的margin特性。
                在BFC中相邻的块级元素的外边距会折叠(Mastering margin collapsing)。
                生成BFC元素的子元素中，每一个子元素左外边距与包含块的左边界相接触（对于从右到左的格式化，右外边距接触右边界），
                即使浮动元素也是如此（尽管子元素的内容区域会由于浮动而压缩），除非这个子元素也创建了一个新的BFC（如它自身也是一个浮动元素）。
            规则解读：
              1 内部的Box会在垂直方向上一个接一个的放置
              2 内部的Box垂直方向上的距离由margin决定。（完整的说法是：属于同一个BFC的两个相邻Box的margin会发生折叠，不同BFC不会发生折叠。）
              3 每个元素的左外边距与包含块的左边界相接触（从左向右），即使浮动元素也是如此。
                （这说明BFC中子元素不会超出他的包含块，而position为absolute的元素可以超出他的包含块边界）
              4 BFC的区域不会与float的元素区域重叠
              5 计算BFC的高度时，浮动子元素也参与计算
		 */
