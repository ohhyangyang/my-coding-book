<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style type="text/css">
		/*
		3D平移
		translateX(px或%) x轴移动
		translateY(px或%) y轴移动
		translateZ(px) z轴移动，⚠️ 不可以写%
		translate3d(x,y,z)
		 */
		
		
		*{
			margin: 0;
			padding: 0;
		}
		#wrap{
			width: 400px;
			height:400px;
			border:1px solid;
			position: absolute;
			left: 50%;
			top: 50%;
			margin-top: -200px;
			margin-left: -200px;
			perspective: 100px;/*刚好甩到屏幕边缘上*/
		}
		#inner{
			position: absolute;
			left: 50%;
			top:50%;
			margin-left: -100px;
			margin-top: -100px;
			width: 200px;
			height: 200px;
			border-radius: 50%;
			border:1px solid;
			text-align: center;
			line-height: 200px;
			font-size: 20px;
			transition: 2s;
			background-color: #fff3cd;
		}
		#inner:hover{
			transform: translate3d(100%,100%,-100px);
		}
	</style>
</head>
<body>
<div id="wrap">
	<div id="inner">YANGYANG</div>
</div>
</body>
</html>
