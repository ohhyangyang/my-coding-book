<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style type="text/css">
		*{
			margin: 0;
			padding: 0;
		}
		html,body{
			height: 100%;
			overflow: hidden;
		}
		#dialogBox{
			width: 400px;
			height: 200px;
			border: 1px solid;
			border-radius: 200px/100px;
			text-align: center;
			font: 20px/200px "Arial";
			position: relative;
		}
		#dialogBox::before{
			display: block;
			content: "";
			width: 35px;
			height: 35px;
			border: 1px solid;
			border-radius: 50%;
			position: absolute;
			left: 380px;
			top: 160px;
		}
		#dialogBox::after{
			display: block;
			content: "";
			width: 15px;
			height: 15px;
			border: 1px solid;
			border-radius: 50%;
			position: absolute;
			left: 420px;
			top: 200px;
		}
	</style>
</head>
<body>
<div id="dialogBox">大家好，我是对话框</div>
</body>
</html>
