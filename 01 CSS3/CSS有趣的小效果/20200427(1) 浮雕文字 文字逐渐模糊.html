<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style type="text/css">

		/* 浮雕文字 */
		#test1{
			font: bold 50px "Arial";
			text-align: center;
			color: white;
			text-shadow: black 1px 1px 10px;
			
		}
		/* 文字逐渐模糊 */
		#test2{
			font: bold 50px "Arial";
			text-align: center;
			color: #000;
			text-shadow: 0 0 0 rgba(0,0,0,1);
			border: 1px solid #000;
			transition: 1s;
		}
		#test2:hover{
			color: rgba(0,0,0,0);
			text-shadow: 0 0 100px rgba(0,0,0,0);
		}
		
	</style>
</head>
<body>

<p id="test1">GE YANG</p>
<p id="test2">GE YANG</p>
</body>
</html>
