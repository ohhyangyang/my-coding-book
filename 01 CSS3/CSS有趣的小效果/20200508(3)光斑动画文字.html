<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style type="text/css">
		*{
			margin: 0;
			padding: 0;
		}
		html,body{
			background-color: black;
			text-align: center;
		}
		h1{
			/*transition: 2s;*/
			display: inline-block;
			color: rgba(255,255,255,0.3);
			margin-top: 100px;
			font:bold 80px "微软雅黑" ;
			-webkit-background-clip: text;
			margin:100px;
			background-image: linear-gradient(150deg,rgba(255,255,255,0) 30%,rgba(255,255,255,0.8) 45%,rgba(255,255,255,0) 60%);
			background-repeat: no-repeat;
		}
		/*h1:hover{
			background-position: 500px 0;
		}*/
	</style>
	<script type="text/javascript">
		window.onload=function () {
            var h1=document.querySelector("h1");
            var positionX=-500;
            
            setInterval(function () {
                positionX++;
                if(positionX==700){
                    positionX=-500;
                }
                h1.style.backgroundPositionX = positionX + "px";
            },1)
        }
	</script>
</head>
<body>
<h1>我是一段光斑动画</h1>
</body>
</html>
