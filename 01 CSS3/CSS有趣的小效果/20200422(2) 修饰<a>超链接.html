<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style type="text/css">
	
		/* #box3 */
		#box3 a{
			text-decoration: none;
			color: black;
			background-color: lightgrey;
			font-size: 14px;
			display: block;
			float: left;
			width: 100px;
			height: 30px;
			margin: 0 10px;
		}
		#box3{
			width: 800px;
			height: 50px;
			margin: 0 auto;
		}
		#box3>a:not(:last-of-type){
			border-right: #fd7e14 1px solid;
		}
	</style>
</head>
<body>

<div id="box3">
	<a href="#">first</a>
	<a href="#">second</a>
	<a href="#">third</a>
	<a href="#">fourth</a>
	<a href="#">fifth</a>
	
</div>
</body>
</html>
