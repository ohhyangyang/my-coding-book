<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style type="text/css">
		
		
		*{
			margin:0;
			padding: 0;
		}
		
		#wrap{
			position: absolute;
			left: 0;
			right: 0;
			top: 0;
			bottom: 0;
			margin: auto;
			
			width: 400px;
			height: 400px;
			border: 1px solid;
			background-color: #d0e9c6;
			background-size: 100% 100%;
			perspective: 400px;
			/*transform-style: preserve-3d;  取消box 3D舞台，使box不被背景遮挡*/
		}
		
		#wrap > .box{
			position: absolute;
			left: 0;
			right: 0;
			top: 0;
			bottom: 0;
			margin: auto;
			
			width: 100px;
			height: 100px;
			/*background-color: #d0e9c6;*/
			transition: 1s;
			transform-origin: center center -50px;/*旋转基点向后退*/
			transform-style: preserve-3d;/*赋予六个面3D舞台*/
			transform: rotate3d(1,2,3,360deg);
		}
		
		#wrap > .box > div{
			position: absolute;
			width: 100px;
			height: 100px;
			background-color: red;
			opacity: 80%;
			font: 30px/100px Arial;
			text-align: center;
			backface-visibility: hidden;
			transform-origin: center center -50px;/*设置旋转基点为立方体的中心点*/
		}
		#wrap > .box > div:nth-child(1){
		
		}
		
		#wrap > .box > div:nth-child(2){
			transform: rotateY(180deg) rotate(180deg);
		}
		
		#wrap > .box > div:nth-child(3){
			transform: rotateY(270deg);
		}
		
		#wrap > .box > div:nth-child(4){
			transform: rotateY(90deg);
		}
		
		#wrap > .box > div:nth-child(5){
			transform: rotateX(90deg);
		}
		
		#wrap > .box > div:nth-child(6){
			transform: rotateX(270deg);
		}
		#wrap:hover >.box{
			transform: rotateX(180deg);
		}
		
	
	</style>
</head>
<body>
<div id="wrap">
	<div class="box">
		<div>前</div>
		<div>后</div>
		<div>左</div>
		<div>右</div>
		<div>上</div>
		<div>下</div>
	</div>
</div>
</body>
</html>
