<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style type="text/css">
		/*
		- transform的matrix矩阵
		（现在已经不常用到，是以前常用的方法
		  我反正是没仔细听，等真的用到再说吧
		  总之各个变形效果之间组合应用时，书写顺序不同，产生的结果不同）
		  
		  在2D变形中，matrix()接受6个值
		    语法： matrix(a,b,c,d,e,f);
		               (⚠️ 不加单位)
		               
		  matrix（cosθ, sinθ, -sinθ, cosθ, 0, 0) 等同于：rotate(θdeg)
		  matrix（1, 0, 0, 1, e, f) 等同于：translate(epx, fpx)
		  matrix（a, 0, 0, d, 0, 0) 等同于：scale(a, d)
		  matrix（1, tan(θy), tan(θx), 1, 0, 0) 等同于：skew(θxdeg, θydeg)

		 */
		*{
			margin: 0;
			padding: 0;
		}
		#box1{
			width: 200px;
			height: 200px;
			margin: 20px;
			border: 1px solid;
			position: relative;
		}
		#test1{
			width: 100px;
			height: 100px;
			background-color: red;
			/*border-radius: 50%;*/
			
			position: absolute;
			top: 0;
			bottom: 0;
			left: 0;
			right: 0;
			margin: auto;
			
			transition: 1s;
			transform-origin: left top;
		}
		#box1:hover #test1{
			transform: matrix(1,0,0,1,20,30);
		}
	</style>
</head>
<body>
<div id="box1">
	translate平移
	<div id="test1"></div>
</div>
</body>
</html>
